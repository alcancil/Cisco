<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulado STP - Spanning Three Protocol</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

  <div class="w-full max-w-2xl bg-white shadow-lg rounded-xl p-6">
    <div id="start-screen" class="text-center">
      <h1 class="text-2xl font-bold mb-4">Simulado STP - Spanning Three Protocol</h1>
      <p class="mb-6 text-slate-600">Este simulado contém 10 questões sobre STP - Spanning Three Protocol. Você terá 10 minutos para concluir.</p>
      <div class="max-w-sm mx-auto mb-4">
  <label for="user-name" class="block text-left text-sm font-medium text-slate-700 mb-1">Seu nome</label>
  <input id="user-name" type="text" placeholder="Digite seu nome" class="w-full px-3 py-2 rounded-lg border" />
</div>
<button onclick="startQuiz()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Iniciar</button>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <span id="timer" class="font-semibold text-slate-700">Tempo: 10:00</span>
        <span id="question-number" class="font-semibold text-slate-700">1</span>
      </div>

      <div class="w-full bg-slate-200 rounded-full h-3 mb-6">
        <div id="progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
      </div>

      <h2 id="question-text" class="text-lg font-semibold mb-4"></h2>
      <div id="options" class="space-y-3"></div>
      <button id="next-btn" onclick="nextQuestion()" disabled class="mt-6 px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Próxima Questão</button>
    </div>

    <div id="result-screen" class="hidden text-center">
      <h2 class="text-2xl font-bold mb-4">Resultado</h2>
      <p id="score" class="mb-4 text-lg"></p>
      <div id="review" class="text-left space-y-4"></div>
      <button onclick="location.reload()" class="mt-6 px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700">Refazer Simulado</button>
    </div>
  </div>

  <script>
    const quizData = [
      { 
      question: "Qual BPDU especial um switch envia em direção ao Root Bridge quando detecta uma mudança de topologia?", 
      options: ["TC Flag BPDU", "TCA BPDU", "TCN BPDU", "Hello BPDU"], 
      answer: "TCN BPDU", 
      explanation: "O TCN (Topology Change Notification) é enviado pelo switch que detectou a mudança pela sua Root Port em direção ao Root Bridge. O vizinho responde com TCA (Topology Change Acknowledgment) e repassa o TCN para cima." 
    },

    { 
      question: "Qual ação o Root Bridge executa ao receber um TCN de um switch da rede?", 
      options: ["Reinicia todos os timers STP", "Envia BPDUs com a flag TC marcada para toda a rede", "Coloca todas as portas em Blocking", "Solicita reeleição imediata"], answer: "Envia BPDUs com a flag TC marcada para toda a rede", 
      explanation: "Ao receber o TCN, o Root Bridge confirma com TCA e começa a enviar BPDUs com a flag TC (Topology Change) ativa para toda a topologia. Isso instrui todos os switches a acelerarem a expiração da tabela MAC." 
    },

    { 
      question: "Qual é o efeito prático da flag TC nos switches que a recebem?", 
      options: ["Aumentam o Hello Time para 10 segundos", "Reduzem o tempo de expiração da tabela MAC de 300s para o valor do Forward Delay (15s)", "Colocam todas as portas em Learning", "Reenviam seus próprios TCNs"], 
      answer: "Reduzem o tempo de expiração da tabela MAC de 300s para o valor do Forward Delay (15s)", 
      explanation: "O tempo padrão de envelhecimento da tabela MAC é 300s (5 minutos). Ao receber TC, os switches reduzem esse timer para 15s (Forward Delay), forçando a releitura rápida da topologia e evitando o envio de tráfego para portas antigas." 
    },

    { 
      question: "Por que a redução do MAC aging para 15s após um TCN é necessária?", 
      options: ["Para liberar memória nos switches", "Para evitar que tráfego seja enviado para portas antigas após a mudança de topologia", "Para acelerar a eleição do novo Root Bridge", "Para sincronizar os timers de todos os switches"], 
      answer: "Para evitar que tráfego seja enviado para portas antigas após a mudança de topologia", 
      explanation: "Sem o TCN, as entradas antigas da tabela MAC expirariam em 300s. Durante esse tempo, o switch enviaria tráfego para portas que já não são mais os caminhos corretos após a reconvergência, criando um 'black hole' de tráfego." 
    },

    { 
      question: "Qual é o principal risco de um Root Bridge mal posicionado na topologia (switch lento no núcleo)?", 
      options: ["Loops de Camada 2 imediatos", "Todo o tráfego da rede passa pelo switch lento, criando gargalo (bottleneck)", "Instabilidade nos timers STP", "Perda da tabela VLAN"], 
      answer: "Todo o tráfego da rede passa pelo switch lento, criando gargalo (bottleneck)", 
      explanation: "Como toda a árvore STP tem o Root Bridge como referência central, um switch de 10/100 Mbps eleito Root faz com que todos os caminhos convergam para ele. O resultado é latência elevada em toda a infraestrutura." 
    },

    { 
      question: "O que é MAC Flapping e em qual cenário problemático ele ocorre?", 
      options: ["Oscilação de links físicos por defeito de cabo", "Associação constante do mesmo MAC a múltiplas portas, causada por loop de Camada 2", "Expiração prematura da tabela CAM por Max Age baixo", "Conflito de Bridge ID entre dois switches"], 
      answer: "Associação constante do mesmo MAC a múltiplas portas, causada por loop de Camada 2", 
      explanation: "Em um loop, o mesmo frame chega ao switch por portas diferentes em frações de segundo. O switch atualiza a entrada do MAC origem continuamente, causando instabilidade total na tabela CAM — o MAC Flapping. É um sintoma claro de Broadcast Storm." 
    },

    { 
      question: "Qual falha ocorre quando um cabo de fibra ótica permite tráfego em apenas uma direção, e como o switch afetado reage?", 
      options: ["PVID Inconsistency — a porta entra em estado Broken", "Unidirectional Link Failure — o switch para de receber BPDUs e pode colocar a porta em Forwarding criando loop", "Hello Timeout — o switch aumenta o intervalo de envio de BPDUs", "MAC Flapping — a tabela CAM é apagada"], 
      answer: "Unidirectional Link Failure — o switch para de receber BPDUs e pode colocar a porta em Forwarding criando loop", 
      explanation: "Em uma falha unidirecional (link fantasma), o Switch B para de receber BPDUs do Switch A. Após o Max Age, ele assume que o caminho está livre e coloca a porta em Forwarding, criando um loop físico. Soluções: UDLD e Loop Guard." 
    },

    { 
      question: "O que causa o estado 'Broken' (BKN) em uma porta STP e como verificá-lo?", 
      options: ["Falha física no cabo — verificar com 'show interfaces'", "Configuração de VLANs nativas diferentes em um trunk (PVID Inconsistent) — verificar com 'show spanning-tree inconsistentports'", "Root Bridge inadequado — verificar com 'show spanning-tree vlan'", "Loop de Camada 2 ativo — verificar com 'show mac address-table'"], 
      answer: "Configuração de VLANs nativas diferentes em um trunk (PVID Inconsistent) — verificar com 'show spanning-tree inconsistentports'", 
      explanation: "Quando dois switches têm VLANs nativas diferentes no trunk, o STP detecta essa inconsistência (PVID Inconsistent) e coloca a porta em estado Broken para evitar vazamento de tráfego entre VLANs. Diagnóstico: 'show spanning-tree inconsistentports'." 
    },

    { 
      question: "Em um cenário de Broadcast Storm ativo, por que o acesso remoto SSH ao switch é perdido?", 
      options: ["O SSH é desabilitado automaticamente pelo STP", "A CPU do switch está a 100% processando frames BUM, sem recursos para processar pacotes de gerência", "O endereço IP do switch é apagado da tabela ARP", "O link de gerência é colocado em Blocking pelo STP"], 
      answer: "A CPU do switch está a 100% processando frames BUM, sem recursos para processar pacotes de gerência", 
      explanation: "Durante uma Broadcast Storm, os switches ficam processando milhares de cópias de frames por segundo. A CPU do plano de controle satura completamente, inviabilizando qualquer comunicação de gerência. A solução geralmente exige acesso físico via console." 
    },

    { 
      question: "Qual é a sequência correta do mecanismo TCN após a detecção de falha de link?", 
      options: ["Root envia TC → Switch detecta falha → TCN sobe → TCA confirma", "Switch detecta falha → envia TCN via Root Port → vizinho responde TCA → Root envia flag TC para toda a rede", "Switch detecta falha → Root reinicia STP → todos entram em Blocking", "TCN é enviado por flooding → Root confirma → tabela MAC é apagada"], 
      answer: "Switch detecta falha → envia TCN via Root Port → vizinho responde TCA → Root envia flag TC para toda a rede", 
      explanation: "Sequência TCN: 1) Switch detecta link down/up para Forwarding, 2) Envia TCN pela Root Port, 3) Vizinho confirma com TCA e repassa TCN para cima, 4) Root recebe TCN e passa a enviar BPDUs com flag TC, 5) Todos os switches reduzem MAC aging para 15s." 
    }

      // 👉 Adicione mais questões aqui
    ];

    // Randomiza ordem das questões
    quizData.sort(() => Math.random() - 0.5);

    let currentQuestionIndex = 0;
    let score = 0;
    let timer;
    const totalTime = 10 * 60;
    
    // Armazena as respostas do usuário para revisão
    let userAnswers = [];

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");
    const questionTextEl = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options");
    const nextBtn = document.getElementById("next-btn");
    const scoreEl = document.getElementById("score");
    const questionNumberEl = document.getElementById("question-number");
    const timerEl = document.getElementById("timer");
    const reviewEl = document.getElementById("review");

const SIMULADO_ID = "teste01";
const SIMULADO_TITULO = document.title || "Simulado";
let startTime = null;
let currentUserName = "";

// Helpers para salvar resultados no LocalStorage
function formatSeconds(s) {
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${String(m).padStart(2, "0")}:${String(r).padStart(2, "0")}`;
}
function saveResult(record) {
  try {
    const raw = localStorage.getItem("simulados");
    const arr = raw ? JSON.parse(raw) : [];
    arr.push(record);
    localStorage.setItem("simulados", JSON.stringify(arr));
  } catch (e) { console.warn("Falha ao salvar resultado:", e); }
}


    function startQuiz() {
  const nameInput = document.getElementById("user-name");
  const nameVal = (nameInput?.value || "").trim();
  if (!nameVal) { alert("Por favor, informe seu nome antes de iniciar."); return; }
  currentUserName = nameVal;
  startTime = Date.now();
      startScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
      showQuestion();
      startTimer();
    }

    function startTimer() {
      let timeLeft = totalTime;
      timer = setInterval(() => {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerEl.textContent = `Tempo: ${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
        if (timeLeft-- <= 0) {
          clearInterval(timer);
          showResults();
        }
      }, 1000);
    }

    function updateProgressBar() {
      const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
      document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function showQuestion() {
      const q = quizData[currentQuestionIndex];
      questionNumberEl.textContent = `${currentQuestionIndex+1}/${quizData.length}`;
      questionTextEl.textContent = q.question;
      optionsContainer.innerHTML = '';

      const shuffled = [...q.options].sort(() => Math.random() - 0.5);
      shuffled.forEach(opt => {
        const b = document.createElement("button");
        b.textContent = opt;
        b.classList.add("quiz-option","w-full","text-left","p-4","border-2","rounded-lg","transition-colors","duration-200","hover:bg-blue-100","hover:border-blue-400");
        b.onclick = () => selectOption(b, opt);
        optionsContainer.appendChild(b);
      });

      nextBtn.textContent = currentQuestionIndex === quizData.length - 1 ? "Ver Resultados" : "Próxima Questão";
      nextBtn.disabled = true;

      updateProgressBar();
    }

    function selectOption(button, selected) {
      const q = quizData[currentQuestionIndex];
      const buttons = document.querySelectorAll(".quiz-option");

      buttons.forEach(b => b.disabled = true);

      // Armazena a resposta do usuário para a revisão
      userAnswers[currentQuestionIndex] = selected;

      if (selected === q.answer) {
        button.classList.add("bg-green-200","border-green-600");
        score++;
      } else {
        button.classList.add("bg-red-200","border-red-600");
        buttons.forEach(b => {
          if (b.textContent === q.answer) b.classList.add("bg-green-200","border-green-600");
        });
      }

      nextBtn.disabled = false;
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < quizData.length) {
        showQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
  const endTime = Date.now();
  const timeSpentSeconds = startTime ? Math.round((endTime - startTime) / 1000) : 0;
  const resultRecord = {
    id: String(Date.now()),
    simuladoId: SIMULADO_ID,
    simuladoTitle: SIMULADO_TITULO,
    name: currentUserName,
    score: score,
    total: quizData.length,
    percent: quizData.length ? (score / quizData.length) * 100 : 0,
    timeSeconds: timeSpentSeconds,
    timeFormatted: formatSeconds(timeSpentSeconds),
    date: new Date().toISOString()
  };
  saveResult(resultRecord);
      clearInterval(timer);
      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");

      const pct = quizData.length ? Math.round((score/quizData.length)*100) : 0;
scoreEl.textContent = `Você acertou ${score} de ${quizData.length} questões (${pct}%). Tempo: ${formatSeconds(timeSpentSeconds)}.`;

      reviewEl.innerHTML = quizData.map((q, i) => {
        const isCorrect = userAnswers[i] === q.answer;
        const resultClass = isCorrect ? "bg-green-100 border-green-600" : "bg-red-100 border-red-600";
        return `
          <div class="p-4 border rounded-lg ${resultClass}">
            <p class="font-semibold">Q${i+1}: ${q.question}</p>
            <p class="text-sm">Sua resposta: <span class="font-semibold">${userAnswers[i] || 'Não respondida'}</span></p>
            <p class="text-sm">Resposta correta: <span class="font-semibold">${q.answer}</span></p>
            <p class="text-slate-600 text-sm mt-1">${q.explanation}</p>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
