<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulado STP - Eleição de Portas (RP e DP)</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

  <div class="w-full max-w-2xl bg-white shadow-lg rounded-xl p-6">
    <div id="start-screen" class="text-center">
      <h1 class="text-2xl font-bold mb-4">Simulado STP - Eleição de Portas (RP e DP)</h1>
      <p class="mb-6 text-slate-600">Este simulado contém 10 questões sobre STP - Spanning Three Protocol. Você terá 10 minutos para concluir.</p>
      <div class="max-w-sm mx-auto mb-4">
  <label for="user-name" class="block text-left text-sm font-medium text-slate-700 mb-1">Seu nome</label>
  <input id="user-name" type="text" placeholder="Digite seu nome" class="w-full px-3 py-2 rounded-lg border" />
</div>
<button onclick="startQuiz()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Iniciar</button>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <span id="timer" class="font-semibold text-slate-700">Tempo: 10:00</span>
        <span id="question-number" class="font-semibold text-slate-700">1</span>
      </div>

      <div class="w-full bg-slate-200 rounded-full h-3 mb-6">
        <div id="progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
      </div>

      <h2 id="question-text" class="text-lg font-semibold mb-4"></h2>
      <div id="options" class="space-y-3"></div>
      <button id="next-btn" onclick="nextQuestion()" disabled class="mt-6 px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Próxima Questão</button>
    </div>

    <div id="result-screen" class="hidden text-center">
      <h2 class="text-2xl font-bold mb-4">Resultado</h2>
      <p id="score" class="mb-4 text-lg"></p>
      <div id="review" class="text-left space-y-4"></div>
      <button onclick="location.reload()" class="mt-6 px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700">Refazer Simulado</button>
    </div>
  </div>

  <script>
    const quizData = [
      {
        question: "Qual é o critério principal e mandatório para a eleição de uma Root Port (RP)?",
        options: ["O menor Bridge ID (BID) vizinho", "O menor Root Path Cost (RPC) acumulado até o Root Bridge", "O maior custo de interface local", "A menor prioridade de porta configurada"],
        answer: "O menor Bridge ID (BID) vizinho",
        explanation: "A Root Port é a porta 'mais próxima' do Root Bridge. O STP elege como RP a interface que apresenta o menor custo acumulado (Root Path Cost) para chegar ao  Root Bridge."
      },
      {
        question: "Durante a eleição da Root Port, se houver empate no Root Path Cost, qual é o próximo critério de desempate?",
        options: ["Menor Port ID local", "Menor Bridge ID (BID) do switch vizinho (Sender BID)", "Maior Prioridade de Bridge", "Menor endereço MAC local"],
        answer: "Menor Bridge ID (BID) do switch vizinho (Sender BID)",
        explanation: "Em caso de empate no RPC, o STP olha para o Bridge ID do switch que enviou a BPDU (Sender BID). O menor BID vizinho desempata e a porta conectada a ele torna-se a Root Port."
      },
      {
        question: "O que compõe o Port ID (PID) utilizado no último critério de desempate da Root Port?",
        options: ["Prioridade da porta + Índice da porta", "Endereço MAC + IP da interface", "Bridge ID + Custo do link", "VLAN ID + Prioridade"],
        answer: "Prioridade da porta + Índice da porta",
        explanation: "O Port ID (PID) é formado por 16 bits: 4 bits para a Prioridade da Porta (padrão 128) e 12 bits para o Índice da Porta (número da interface)."
      },
      {
        question: "Sobre as Designated Ports (DP), qual afirmação está correta?",
        options: ["Pode existir mais de uma DP por segmento de rede", "O Root Bridge nunca possui portas designadas", "Existe exatamente uma Designated Port por segmento (link)", "Portas DP sempre operam em modo Blocking"],
        answer: "Existe exatamente uma Designated Port por segmento (link)",
        explanation: "Por definição, cada segmento de rede (cabo) deve ter exatamente uma Designated Port (DP). Essa porta é responsável por encaminhar BPDUs e tráfego de dados para aquele segmento."
      },
      {
        question: "No Wireshark, onde você localiza o valor do Root Path Cost enviado por um switch?",
        options: ["Dentro do cabeçalho Ethernet II", "No campo 'Root Path Cost' dentro do protocolo Spanning Tree das BPDUs", "No campo 'Flags' da BPDU", "No trailer do quadro (FCS)"],
        answer: "No campo 'Root Path Cost' dentro do protocolo Spanning Tree das BPDUs",
        explanation: "O Wireshark decodifica o protocolo STP. O valor do RPC está explicitamente no campo 'Root Path Cost' dentro da seção do protocolo Spanning Tree nas BPDUs de Configuração."
      },
      {
        question: "Se um switch recebe duas BPDUs com o mesmo RPC e o mesmo Sender BID, qual critério ele usará para eleger a Root Port?",
        options: ["Menor Prioridade de Bridge", "Menor Port ID do switch vizinho (Sender Port ID)", "Menor custo de interface configurado localmente", "O switch entrará em modo Loop Error"],
        answer: "Menor Port ID do switch vizinho (Sender Port ID)",
        explanation: "Se houver empate no RPC e no Sender BID, o STP utiliza o Port ID do switch vizinho que enviou a BPDU (Sender Port ID) como último critério de desempate para a Root Port."
      },
      {
        question: "Qual o valor do Root Path Cost (RPC) enviado nas BPDUs pelo próprio Root Bridge",
        options: ["32768", "1", "4", "0"],
        answer: "0",
        explanation: "O Root Bridge é o ponto de origem da topologia. Como ele é o 'custo zero' para chegar a si mesmo, todas as BPDUs que ele envia contêm o valor '0' no campo Root Path Cost."
      },
      {
        question: "No padrão PVST+ da Cisco, qual a principal diferença em relação ao STP (802.1D)?",
        options: ["O PVST+ não utiliza BPDUs", "O PVST+ roda uma instância independente de STP para cada VLAN", "O PVST+ utiliza apenas o endereço MAC para eleição", "O PVST+ remove o estado de Blocking"],
        answer: "O PVST+ roda uma instância independente de STP para cada VLAN",
        explanation: "O Per-VLAN Spanning Tree Plus (PVST+) é a implementação padrão da Cisco. Ele cria uma instância de STP separada para cada VLAN, permitindo balanceamento de carga Layer 2."
      },
      {
        question: "Na verificação via CLI (show spanning-tree), o que o status 'FWD' indica para uma interface?",
        options: ["A porta está em modo de falha (Failure)", "A porta está descartando quadros (Discarding)", "A porta está em estado de encaminhamento (Forwarding)", "A porta é a nova Root Bridge"],
        answer: "A porta está em estado de encaminhamento (Forwarding)",
        explanation: "O status 'FWD' (Forwarding) indica que a porta STP completou os estados de escuta e aprendizado e agora está ativamente encaminhando quadros de dados."
      },
      {
        question: "Em um segmento entre dois switches que não são o Root, como é decidida qual porta será a Designated Port?",
        options: ["O switch com o menor Root Path Cost para o Root Bridge vence", "O switch com o maior endereço MAC vence", "A porta com o maior número de interface vence", "Ambas as portas ficam em modo Blocking"],
        answer: "O switch com o menor Root Path Cost para o Root Bridge vence",
        explanation: "A eleição da DP no segmento segue a mesma lógica da RP, mas compara os custos dos dois switches vizinhos. Vence (torna-se DP) a porta do switch que tiver o menor Root Path Cost acumulado."
      }

      // 👉 Adicione mais questões aqui
    ];

    // Randomiza ordem das questões
    quizData.sort(() => Math.random() - 0.5);

    let currentQuestionIndex = 0;
    let score = 0;
    let timer;
    const totalTime = 10 * 60;
    
    // Armazena as respostas do usuário para revisão
    let userAnswers = [];

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");
    const questionTextEl = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options");
    const nextBtn = document.getElementById("next-btn");
    const scoreEl = document.getElementById("score");
    const questionNumberEl = document.getElementById("question-number");
    const timerEl = document.getElementById("timer");
    const reviewEl = document.getElementById("review");

const SIMULADO_ID = "teste01";
const SIMULADO_TITULO = document.title || "Simulado";
let startTime = null;
let currentUserName = "";

// Helpers para salvar resultados no LocalStorage
function formatSeconds(s) {
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${String(m).padStart(2, "0")}:${String(r).padStart(2, "0")}`;
}
function saveResult(record) {
  try {
    const raw = localStorage.getItem("simulados");
    const arr = raw ? JSON.parse(raw) : [];
    arr.push(record);
    localStorage.setItem("simulados", JSON.stringify(arr));
  } catch (e) { console.warn("Falha ao salvar resultado:", e); }
}


    function startQuiz() {
  const nameInput = document.getElementById("user-name");
  const nameVal = (nameInput?.value || "").trim();
  if (!nameVal) { alert("Por favor, informe seu nome antes de iniciar."); return; }
  currentUserName = nameVal;
  startTime = Date.now();
      startScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
      showQuestion();
      startTimer();
    }

    function startTimer() {
      let timeLeft = totalTime;
      timer = setInterval(() => {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerEl.textContent = `Tempo: ${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
        if (timeLeft-- <= 0) {
          clearInterval(timer);
          showResults();
        }
      }, 1000);
    }

    function updateProgressBar() {
      const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
      document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function showQuestion() {
      const q = quizData[currentQuestionIndex];
      questionNumberEl.textContent = `${currentQuestionIndex+1}/${quizData.length}`;
      questionTextEl.textContent = q.question;
      optionsContainer.innerHTML = '';

      const shuffled = [...q.options].sort(() => Math.random() - 0.5);
      shuffled.forEach(opt => {
        const b = document.createElement("button");
        b.textContent = opt;
        b.classList.add("quiz-option","w-full","text-left","p-4","border-2","rounded-lg","transition-colors","duration-200","hover:bg-blue-100","hover:border-blue-400");
        b.onclick = () => selectOption(b, opt);
        optionsContainer.appendChild(b);
      });

      nextBtn.textContent = currentQuestionIndex === quizData.length - 1 ? "Ver Resultados" : "Próxima Questão";
      nextBtn.disabled = true;

      updateProgressBar();
    }

    function selectOption(button, selected) {
      const q = quizData[currentQuestionIndex];
      const buttons = document.querySelectorAll(".quiz-option");

      buttons.forEach(b => b.disabled = true);

      // Armazena a resposta do usuário para a revisão
      userAnswers[currentQuestionIndex] = selected;

      if (selected === q.answer) {
        button.classList.add("bg-green-200","border-green-600");
        score++;
      } else {
        button.classList.add("bg-red-200","border-red-600");
        buttons.forEach(b => {
          if (b.textContent === q.answer) b.classList.add("bg-green-200","border-green-600");
        });
      }

      nextBtn.disabled = false;
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < quizData.length) {
        showQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
  const endTime = Date.now();
  const timeSpentSeconds = startTime ? Math.round((endTime - startTime) / 1000) : 0;
  const resultRecord = {
    id: String(Date.now()),
    simuladoId: SIMULADO_ID,
    simuladoTitle: SIMULADO_TITULO,
    name: currentUserName,
    score: score,
    total: quizData.length,
    percent: quizData.length ? (score / quizData.length) * 100 : 0,
    timeSeconds: timeSpentSeconds,
    timeFormatted: formatSeconds(timeSpentSeconds),
    date: new Date().toISOString()
  };
  saveResult(resultRecord);
      clearInterval(timer);
      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");

      const pct = quizData.length ? Math.round((score/quizData.length)*100) : 0;
scoreEl.textContent = `Você acertou ${score} de ${quizData.length} questões (${pct}%). Tempo: ${formatSeconds(timeSpentSeconds)}.`;

      reviewEl.innerHTML = quizData.map((q, i) => {
        const isCorrect = userAnswers[i] === q.answer;
        const resultClass = isCorrect ? "bg-green-100 border-green-600" : "bg-red-100 border-red-600";
        return `
          <div class="p-4 border rounded-lg ${resultClass}">
            <p class="font-semibold">Q${i+1}: ${q.question}</p>
            <p class="text-sm">Sua resposta: <span class="font-semibold">${userAnswers[i] || 'Não respondida'}</span></p>
            <p class="text-sm">Resposta correta: <span class="font-semibold">${q.answer}</span></p>
            <p class="text-slate-600 text-sm mt-1">${q.explanation}</p>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
