<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulado STP - Arquitetura de Decisão e Diferenças de Protocolo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

  <div class="w-full max-w-2xl bg-white shadow-lg rounded-xl p-6">
    <div id="start-screen" class="text-center">
      <h1 class="text-2xl font-bold mb-4">Simulado STP - Arquitetura de Decisão e Diferenças de Protocolo</h1>
      <p class="mb-6 text-slate-600">Este simulado contém 10 questões sobre STP - Spanning Three Protocol. Você terá 10 minutos para concluir.</p>
      <div class="max-w-sm mx-auto mb-4">
  <label for="user-name" class="block text-left text-sm font-medium text-slate-700 mb-1">Seu nome</label>
  <input id="user-name" type="text" placeholder="Digite seu nome" class="w-full px-3 py-2 rounded-lg border" />
</div>
<button onclick="startQuiz()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Iniciar</button>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <span id="timer" class="font-semibold text-slate-700">Tempo: 10:00</span>
        <span id="question-number" class="font-semibold text-slate-700">1</span>
      </div>

      <div class="w-full bg-slate-200 rounded-full h-3 mb-6">
        <div id="progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
      </div>

      <h2 id="question-text" class="text-lg font-semibold mb-4"></h2>
      <div id="options" class="space-y-3"></div>
      <button id="next-btn" onclick="nextQuestion()" disabled class="mt-6 px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Próxima Questão</button>
    </div>

    <div id="result-screen" class="hidden text-center">
      <h2 class="text-2xl font-bold mb-4">Resultado</h2>
      <p id="score" class="mb-4 text-lg"></p>
      <div id="review" class="text-left space-y-4"></div>
      <button onclick="location.reload()" class="mt-6 px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700">Refazer Simulado</button>
    </div>
  </div>

  <script>
    const quizData = [
    {
      "question": "De acordo com o Glossário do material, como é definida uma 'Alternate Port' no contexto do STP?",
      "options": [
        "Uma porta que compartilha o tráfego de dados com a Root Port",
        "Uma porta bloqueada que possui um caminho alternativo até o Root Bridge",
        "Uma porta que foi desativada manualmente pelo administrador",
        "A porta principal de um Root Bridge"
      ],
      "answer": "Uma porta bloqueada que possui um caminho alternativo até o Root Bridge",
      "explanation": "A Alternate Port é uma porta em estado de bloqueio (Blocking) que oferece um caminho reserva para o Root Bridge caso a Root Port principal falhe."
    },
    {
      "question": "Qual é a definição exata de 'Designated Port (DP)' apresentada no material?",
      "options": [
        "Porta que recebe os BPDUs de configuração do Root Bridge",
        "Porta que conecta o switch diretamente ao servidor de gerenciamento",
        "Porta que representa um segmento de rede no STP e envia o melhor BPDU naquele link",
        "Porta de um switch não-root com o menor custo até o Root Bridge"
      ],
      "answer": "Porta que representa um segmento de rede no STP e envia o melhor BPDU naquele link",
      "explanation": "A Designated Port é a porta responsável por encaminhar tráfego e BPDUs para um segmento de rede específico, sendo a que possui o melhor caminho para o Root naquele segmento."
    },
    {
      "question": "No processo de decisão da Root Port (RP), qual é o primeiro passo executado pelo switch não-root?",
      "options": [
        "Enviar BPDUs para o Root Bridge",
        "Receber BPDUs pelas interfaces",
        "Bloquear todas as portas redundantes",
        "Comparar o seu próprio MAC com o do vizinho"
      ],
      "answer": "Receber BPDUs pelas interfaces",
      "explanation": "O processo de decisão da Root Port começa obrigatoriamente com a recepção de BPDUs pelas interfaces, permitindo que o switch avalie as informações vindas da rede."
    },
    {
      "question": "Ao verificar o comando 'show spanning-tree', qual valor na coluna 'Role' identifica que uma porta é a Root Port?",
      "options": [
        "Desg",
        "Altn",
        "Root",
        "Master"
      ],
      "answer": "Root",
      "explanation": "No CLI da Cisco, a função da porta é identificada na coluna 'Role'. O valor 'Root' indica que aquela interface foi eleita a Root Port do switch."
    },
    {
      "question": "Se houver empate no 'Root Path Cost' e no 'Sender Bridge ID', qual é o próximo critério de desempate para a eleição da Root Port?",
      "options": [
        "Menor Sender Port Priority",
        "Menor MAC Address local",
        "Maior número de porta (Port ID)",
        "Menor Hello Time"
      ],
      "answer": "Menor Sender Port Priority",
      "explanation": "Seguindo a hierarquia de desempate do material, após o Root Path Cost e o Sender Bridge ID, o STP avalia a Prioridade da Porta do remetente (Sender Port Priority)."
    },
    {
      "question": "Qual é a diferença essencial entre o STP (IEEE 802.1D) e o PVST+ (Cisco) mencionada no README?",
      "options": [
        "O STP usa MAC Multicast e o PVST+ usa Broadcast",
        "O STP possui uma única instância para toda a rede, enquanto o PVST+ roda uma instância por VLAN",
        "O STP é mais rápido que o PVST+ na convergência",
        "O PVST+ não utiliza o algoritmo de eleição de Root Bridge"
      ],
      "answer": "O STP possui uma única instância para toda a rede, enquanto o PVST+ roda uma instância por VLAN",
      "explanation": "A principal diferença é a granularidade: o padrão 802.1D trata a rede como uma única topologia, enquanto o PVST+ da Cisco cria uma árvore de Spanning Tree independente para cada VLAN."
    },
    {
      "question": "O que o material descreve como 'O que NÃO muda' na transição do STP para o PVST+?",
      "options": [
        "O endereço MAC de destino das BPDUs",
        "Os tempos de Forward Delay e Max Age",
        "A lógica do protocolo, incluindo critérios de desempate e funções de portas",
        "A necessidade de configurar o VTP"
      ],
      "answer": "A lógica do protocolo, incluindo critérios de desempate e funções de portas",
      "explanation": "Embora o PVST+ rode por VLAN, o algoritmo fundamental (eleição de Root Bridge, Root Port, Designated Port e critérios de desempate) permanece o mesmo."
    },
    {
      "question": "No estado de 'Blocking' (BLK), qual é o comportamento da porta em relação aos BPDUs?",
      "options": [
        "Ela para de receber e enviar BPDUs",
        "Ela não encaminha tráfego de dados, mas continua recebendo BPDUs",
        "Ela envia BPDUs de configuração a cada 2 segundos",
        "Ela descarta todos os quadros, incluindo BPDUs"
      ],
      "answer": "Ela não encaminha tráfego de dados, mas continua recebendo BPDUs",
      "explanation": "Uma porta bloqueada (Blocking) é removida do encaminhamento de dados para evitar loops, mas deve continuar ouvindo BPDUs para reagir a mudanças na topologia."
    },
    {
      "question": "Qual é a função do 'Hello Time' no protocolo STP?",
      "options": [
        "Tempo que a porta leva para sair de Listening para Learning",
        "Tempo máximo de espera antes de recalcular a topologia",
        "Intervalo (padrão 2s) em que o Root Bridge envia BPDUs",
        "Tempo de expiração das entradas na tabela MAC"
      ],
      "answer": "Intervalo (padrão 2s) em que o Root Bridge envia BPDUs",
      "explanation": "O Hello Time define a frequência com que o Root Bridge gera as mensagens de controle (BPDUs) para manter a topologia ativa e estável."
    },
    {
      "question": "O que significa o termo 'TCN' (Topology Change Notification)?",
      "options": [
        "Um comando CLI para forçar a eleição de um novo Root",
        "Uma sinalização enviada quando há mudança na topologia STP",
        "O processo de transição para o estado de Forwarding",
        "Um tipo de BPDU exclusivo do protocolo RSTP"
      ],
      "answer": "Uma sinalização enviada quando há mudança na topologia STP",
      "explanation": "TCN é a mensagem usada pelos switches para avisar ao Root Bridge que um link caiu ou subiu, iniciando o processo de atualização da topologia na rede."
    }
      
      // 👉 Adicione mais questões aqui
    ];

    // Randomiza ordem das questões
    quizData.sort(() => Math.random() - 0.5);

    let currentQuestionIndex = 0;
    let score = 0;
    let timer;
    const totalTime = 10 * 60;
    
    // Armazena as respostas do usuário para revisão
    let userAnswers = [];

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");
    const questionTextEl = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options");
    const nextBtn = document.getElementById("next-btn");
    const scoreEl = document.getElementById("score");
    const questionNumberEl = document.getElementById("question-number");
    const timerEl = document.getElementById("timer");
    const reviewEl = document.getElementById("review");

const SIMULADO_ID = "teste01";
const SIMULADO_TITULO = document.title || "Simulado";
let startTime = null;
let currentUserName = "";

// Helpers para salvar resultados no LocalStorage
function formatSeconds(s) {
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${String(m).padStart(2, "0")}:${String(r).padStart(2, "0")}`;
}
function saveResult(record) {
  try {
    const raw = localStorage.getItem("simulados");
    const arr = raw ? JSON.parse(raw) : [];
    arr.push(record);
    localStorage.setItem("simulados", JSON.stringify(arr));
  } catch (e) { console.warn("Falha ao salvar resultado:", e); }
}


    function startQuiz() {
  const nameInput = document.getElementById("user-name");
  const nameVal = (nameInput?.value || "").trim();
  if (!nameVal) { alert("Por favor, informe seu nome antes de iniciar."); return; }
  currentUserName = nameVal;
  startTime = Date.now();
      startScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
      showQuestion();
      startTimer();
    }

    function startTimer() {
      let timeLeft = totalTime;
      timer = setInterval(() => {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerEl.textContent = `Tempo: ${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
        if (timeLeft-- <= 0) {
          clearInterval(timer);
          showResults();
        }
      }, 1000);
    }

    function updateProgressBar() {
      const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
      document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function showQuestion() {
      const q = quizData[currentQuestionIndex];
      questionNumberEl.textContent = `${currentQuestionIndex+1}/${quizData.length}`;
      questionTextEl.textContent = q.question;
      optionsContainer.innerHTML = '';

      const shuffled = [...q.options].sort(() => Math.random() - 0.5);
      shuffled.forEach(opt => {
        const b = document.createElement("button");
        b.textContent = opt;
        b.classList.add("quiz-option","w-full","text-left","p-4","border-2","rounded-lg","transition-colors","duration-200","hover:bg-blue-100","hover:border-blue-400");
        b.onclick = () => selectOption(b, opt);
        optionsContainer.appendChild(b);
      });

      nextBtn.textContent = currentQuestionIndex === quizData.length - 1 ? "Ver Resultados" : "Próxima Questão";
      nextBtn.disabled = true;

      updateProgressBar();
    }

    function selectOption(button, selected) {
      const q = quizData[currentQuestionIndex];
      const buttons = document.querySelectorAll(".quiz-option");

      buttons.forEach(b => b.disabled = true);

      // Armazena a resposta do usuário para a revisão
      userAnswers[currentQuestionIndex] = selected;

      if (selected === q.answer) {
        button.classList.add("bg-green-200","border-green-600");
        score++;
      } else {
        button.classList.add("bg-red-200","border-red-600");
        buttons.forEach(b => {
          if (b.textContent === q.answer) b.classList.add("bg-green-200","border-green-600");
        });
      }

      nextBtn.disabled = false;
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < quizData.length) {
        showQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
  const endTime = Date.now();
  const timeSpentSeconds = startTime ? Math.round((endTime - startTime) / 1000) : 0;
  const resultRecord = {
    id: String(Date.now()),
    simuladoId: SIMULADO_ID,
    simuladoTitle: SIMULADO_TITULO,
    name: currentUserName,
    score: score,
    total: quizData.length,
    percent: quizData.length ? (score / quizData.length) * 100 : 0,
    timeSeconds: timeSpentSeconds,
    timeFormatted: formatSeconds(timeSpentSeconds),
    date: new Date().toISOString()
  };
  saveResult(resultRecord);
      clearInterval(timer);
      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");

      const pct = quizData.length ? Math.round((score/quizData.length)*100) : 0;
scoreEl.textContent = `Você acertou ${score} de ${quizData.length} questões (${pct}%). Tempo: ${formatSeconds(timeSpentSeconds)}.`;

      reviewEl.innerHTML = quizData.map((q, i) => {
        const isCorrect = userAnswers[i] === q.answer;
        const resultClass = isCorrect ? "bg-green-100 border-green-600" : "bg-red-100 border-red-600";
        return `
          <div class="p-4 border rounded-lg ${resultClass}">
            <p class="font-semibold">Q${i+1}: ${q.question}</p>
            <p class="text-sm">Sua resposta: <span class="font-semibold">${userAnswers[i] || 'Não respondida'}</span></p>
            <p class="text-sm">Resposta correta: <span class="font-semibold">${q.answer}</span></p>
            <p class="text-slate-600 text-sm mt-1">${q.explanation}</p>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
