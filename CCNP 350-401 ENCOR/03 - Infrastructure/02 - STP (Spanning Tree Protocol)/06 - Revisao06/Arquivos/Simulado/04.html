<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulado STP - BPDUs, Wireshark e Algoritmo STP</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

  <div class="w-full max-w-2xl bg-white shadow-lg rounded-xl p-6">
    <div id="start-screen" class="text-center">
      <h1 class="text-2xl font-bold mb-4">Simulado STP - BPDUs, Wireshark e Algoritmo STP</h1>
      <p class="mb-6 text-slate-600">Este simulado contém 10 questões sobre STP - Spanning Three Protocol. Você terá 10 minutos para concluir.</p>
      <div class="max-w-sm mx-auto mb-4">
  <label for="user-name" class="block text-left text-sm font-medium text-slate-700 mb-1">Seu nome</label>
  <input id="user-name" type="text" placeholder="Digite seu nome" class="w-full px-3 py-2 rounded-lg border" />
</div>
<button onclick="startQuiz()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Iniciar</button>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <span id="timer" class="font-semibold text-slate-700">Tempo: 10:00</span>
        <span id="question-number" class="font-semibold text-slate-700">1</span>
      </div>

      <div class="w-full bg-slate-200 rounded-full h-3 mb-6">
        <div id="progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
      </div>

      <h2 id="question-text" class="text-lg font-semibold mb-4"></h2>
      <div id="options" class="space-y-3"></div>
      <button id="next-btn" onclick="nextQuestion()" disabled class="mt-6 px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Próxima Questão</button>
    </div>

    <div id="result-screen" class="hidden text-center">
      <h2 class="text-2xl font-bold mb-4">Resultado</h2>
      <p id="score" class="mb-4 text-lg"></p>
      <div id="review" class="text-left space-y-4"></div>
      <button onclick="location.reload()" class="mt-6 px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700">Refazer Simulado</button>
    </div>
  </div>

  <script>
    const quizData = [
      {
        question: "Qual é o endereço MAC multicast de destino padrão utilizado pelos frames BPDU do STP?",
        options: [
          "FF:FF:FF:FF:FF:FF",
          "01:00:5E:00:00:01",
          "01:80:C2:00:00:00",
          "00:00:00:00:00:01"
        ],
        answer: "01:80:C2:00:00:00",
        explanation: "Os frames BPDU são enviados para o endereço MAC multicast reservado 01:80:C2:00:00:00. Uma característica fundamental é que switches NÃO encaminham frames destinados a esse endereço — eles são processados localmente, o que é essencial para o funcionamento do STP."
      },
      {
        question: "No Wireshark, ao capturar BPDUs, você observa que o campo 'Root Path Cost' de um switch está com valor 0. O que isso indica?",
        options: [
          "O switch está com custo de interface zerado por configuração manual",
          "O switch está em estado de Blocking e não processa BPDUs",
          "Esse switch é o próprio Root Bridge da topologia",
          "O link está operando em modo half-duplex"
        ],
        answer: "Esse switch é o próprio Root Bridge da topologia",
        explanation: "Apenas o Root Bridge envia BPDUs com Root Path Cost igual a 0, pois ele é a origem da topologia — o custo para chegar a si mesmo é zero. Switches não-root sempre somam o custo do link ao valor recebido antes de repassar o BPDU."
      },
      {
        question: "Analisando uma BPDU no Wireshark, você nota que o campo 'Root Identifier' é idêntico ao campo 'Bridge Identifier'. O que isso comprova?",
        options: [
          "O switch está com configuração de prioridade padrão (32768)",
          "O switch capturado é o Root Bridge da topologia",
          "Há um loop Layer 2 ativo na rede",
          "O switch está operando em modo PVST+"
        ],
        answer: "O switch capturado é o Root Bridge da topologia",
        explanation: "Quando Root ID == Bridge ID em uma BPDU, significa que o switch que gerou aquela BPDU se reconhece como o Root Bridge. Isso ocorre porque o Root Bridge anuncia a si mesmo como raiz da topologia."
      },
      {
        question: "Qual campo de uma BPDU capturada no Wireshark você deve analisar para identificar qual switch enviou aquela mensagem?",
        options: [
          "Root Identifier",
          "Root Path Cost",
          "Bridge Identifier (Sender Bridge ID)",
          "Port ID do receptor"
        ],
        answer: "Bridge Identifier (Sender Bridge ID)",
        explanation: "O campo 'Bridge Identifier' (também chamado Sender Bridge ID) contém o BID do switch que originou aquela BPDU. É a 'assinatura' do remetente e é usado como critério de desempate na eleição da Root Port quando há empate no Root Path Cost."
      },
      {
        question: "No Wireshark, qual filtro de exibição deve ser aplicado para visualizar EXCLUSIVAMENTE BPDUs do STP clássico (802.1D)?",
        options: [
          "stp.version == 2",
          "stp.type == 0x00",
          "eth.dst == FF:FF:FF:FF:FF:FF",
          "stp.flags.tc == 1"
        ],
        answer: "stp.type == 0x00",
        explanation: "O filtro 'stp.type == 0x00' isola BPDUs do tipo Configuration (0x00), que são as BPDUs padrão do STP clássico 802.1D. O filtro 'stp.version == 2' filtraria RSTP, e 'stp.flags.tc == 1' filtra apenas BPDUs com flag de Topology Change ativa."
      },
      {
        question: "Qual filtro no Wireshark você usaria para detectar uma mudança de topologia STP em andamento na rede?",
        options: [
          "stp",
          "stp.version == 2",
          "stp.flags.tc == 1",
          "eth.dst == 01:80:c2:00:00:00"
        ],
        answer: "stp.flags.tc == 1",
        explanation: "O filtro 'stp.flags.tc == 1' exibe apenas BPDUs com a flag Topology Change (TC) ativada. Isso é extremamente útil em troubleshooting, pois TCNs excessivas podem indicar instabilidade de porta, loop ou problema físico na rede."
      },
      {
        question: "O STP toma suas decisões baseado em qual mecanismo, e NÃO em qual?",
        options: [
          "Baseado em tabelas de roteamento; NÃO em BPDUs",
          "Baseado em BPDUs recebidos; NÃO em conhecimento prévio da topologia física",
          "Baseado em endereços IP; NÃO em endereços MAC",
          "Baseado em LLDP; NÃO em BPDUs"
        ],
        answer: "Baseado em BPDUs recebidos; NÃO em conhecimento prévio da topologia física",
        explanation: "O STP é um protocolo reativo: cada switch toma decisões exclusivamente com base nos BPDUs que recebe pelas suas interfaces. O protocolo não tem visão global da topologia — ele 'enxerga' a rede apenas através das informações contidas nos BPDUs recebidos."
      },
      {
        question: "Qual é o valor padrão do timer 'Hello Time' no STP clássico, e quem é responsável por defini-lo para toda a rede?",
        options: [
          "5 segundos, definido por cada switch individualmente",
          "2 segundos, definido pelo Root Bridge e propagado via BPDUs",
          "15 segundos, definido pelo switch com maior prioridade",
          "10 segundos, definido por configuração manual em cada switch"
        ],
        answer: "2 segundos, definido pelo Root Bridge e propagado via BPDUs",
        explanation: "O Hello Time padrão é 2 segundos. É o Root Bridge quem define os timers (Hello Time, Max Age e Forward Delay) para toda a rede STP e os propaga através das BPDUs de configuração. Os demais switches respeitam os timers anunciados pelo Root."
      },
      {
        question: "Após a convergência completa do STP em uma topologia sem redundância de Root Port, qual é a distribuição correta de papéis de porta?",
        options: [
          "Cada switch possui múltiplas Root Ports e nenhuma Designated Port",
          "1 Root Port por switch não-root, 1 Designated Port por segmento, restante em Blocking",
          "O Root Bridge possui Root Ports, os demais apenas Designated Ports",
          "Todas as portas ficam em Forwarding após a convergência"
        ],
        answer: "1 Root Port por switch não-root, 1 Designated Port por segmento, restante em Blocking",
        explanation: "Após a convergência do STP: cada switch não-root possui exatamente 1 Root Port (melhor caminho ao Root); cada segmento de rede possui exatamente 1 Designated Port (melhor switch do segmento); todas as demais portas entram em estado Blocking para eliminar loops."
      },
      {
        question: "No glossário do STP, o 'Sender Bridge ID' é definido como um critério de desempate. Em qual situação exata ele é aplicado?",
        options: [
          "Quando dois switches têm o mesmo endereço MAC base",
          "Quando há empate no Root Path Cost durante a eleição da Root Port",
          "Quando o Root Bridge falha e uma nova eleição é iniciada",
          "Quando duas Designated Ports estão no mesmo segmento"
        ],
        answer: "Quando há empate no Root Path Cost durante a eleição da Root Port",
        explanation: "O Sender Bridge ID é o segundo critério de desempate na eleição da Root Port. Ele é consultado apenas quando dois ou mais caminhos apresentam o mesmo Root Path Cost acumulado. O switch escolhe a porta conectada ao vizinho com o menor Bridge ID (menor prioridade e, em caso de empate, menor MAC)."
      }

      // 👉 Adicione mais questões aqui
    ];

    // Randomiza ordem das questões
    quizData.sort(() => Math.random() - 0.5);

    let currentQuestionIndex = 0;
    let score = 0;
    let timer;
    const totalTime = 10 * 60;
    
    // Armazena as respostas do usuário para revisão
    let userAnswers = [];

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");
    const questionTextEl = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options");
    const nextBtn = document.getElementById("next-btn");
    const scoreEl = document.getElementById("score");
    const questionNumberEl = document.getElementById("question-number");
    const timerEl = document.getElementById("timer");
    const reviewEl = document.getElementById("review");

const SIMULADO_ID = "teste01";
const SIMULADO_TITULO = document.title || "Simulado";
let startTime = null;
let currentUserName = "";

// Helpers para salvar resultados no LocalStorage
function formatSeconds(s) {
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${String(m).padStart(2, "0")}:${String(r).padStart(2, "0")}`;
}
function saveResult(record) {
  try {
    const raw = localStorage.getItem("simulados");
    const arr = raw ? JSON.parse(raw) : [];
    arr.push(record);
    localStorage.setItem("simulados", JSON.stringify(arr));
  } catch (e) { console.warn("Falha ao salvar resultado:", e); }
}


    function startQuiz() {
  const nameInput = document.getElementById("user-name");
  const nameVal = (nameInput?.value || "").trim();
  if (!nameVal) { alert("Por favor, informe seu nome antes de iniciar."); return; }
  currentUserName = nameVal;
  startTime = Date.now();
      startScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
      showQuestion();
      startTimer();
    }

    function startTimer() {
      let timeLeft = totalTime;
      timer = setInterval(() => {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerEl.textContent = `Tempo: ${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
        if (timeLeft-- <= 0) {
          clearInterval(timer);
          showResults();
        }
      }, 1000);
    }

    function updateProgressBar() {
      const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
      document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function showQuestion() {
      const q = quizData[currentQuestionIndex];
      questionNumberEl.textContent = `${currentQuestionIndex+1}/${quizData.length}`;
      questionTextEl.textContent = q.question;
      optionsContainer.innerHTML = '';

      const shuffled = [...q.options].sort(() => Math.random() - 0.5);
      shuffled.forEach(opt => {
        const b = document.createElement("button");
        b.textContent = opt;
        b.classList.add("quiz-option","w-full","text-left","p-4","border-2","rounded-lg","transition-colors","duration-200","hover:bg-blue-100","hover:border-blue-400");
        b.onclick = () => selectOption(b, opt);
        optionsContainer.appendChild(b);
      });

      nextBtn.textContent = currentQuestionIndex === quizData.length - 1 ? "Ver Resultados" : "Próxima Questão";
      nextBtn.disabled = true;

      updateProgressBar();
    }

    function selectOption(button, selected) {
      const q = quizData[currentQuestionIndex];
      const buttons = document.querySelectorAll(".quiz-option");

      buttons.forEach(b => b.disabled = true);

      // Armazena a resposta do usuário para a revisão
      userAnswers[currentQuestionIndex] = selected;

      if (selected === q.answer) {
        button.classList.add("bg-green-200","border-green-600");
        score++;
      } else {
        button.classList.add("bg-red-200","border-red-600");
        buttons.forEach(b => {
          if (b.textContent === q.answer) b.classList.add("bg-green-200","border-green-600");
        });
      }

      nextBtn.disabled = false;
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < quizData.length) {
        showQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
  const endTime = Date.now();
  const timeSpentSeconds = startTime ? Math.round((endTime - startTime) / 1000) : 0;
  const resultRecord = {
    id: String(Date.now()),
    simuladoId: SIMULADO_ID,
    simuladoTitle: SIMULADO_TITULO,
    name: currentUserName,
    score: score,
    total: quizData.length,
    percent: quizData.length ? (score / quizData.length) * 100 : 0,
    timeSeconds: timeSpentSeconds,
    timeFormatted: formatSeconds(timeSpentSeconds),
    date: new Date().toISOString()
  };
  saveResult(resultRecord);
      clearInterval(timer);
      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");

      const pct = quizData.length ? Math.round((score/quizData.length)*100) : 0;
scoreEl.textContent = `Você acertou ${score} de ${quizData.length} questões (${pct}%). Tempo: ${formatSeconds(timeSpentSeconds)}.`;

      reviewEl.innerHTML = quizData.map((q, i) => {
        const isCorrect = userAnswers[i] === q.answer;
        const resultClass = isCorrect ? "bg-green-100 border-green-600" : "bg-red-100 border-red-600";
        return `
          <div class="p-4 border rounded-lg ${resultClass}">
            <p class="font-semibold">Q${i+1}: ${q.question}</p>
            <p class="text-sm">Sua resposta: <span class="font-semibold">${userAnswers[i] || 'Não respondida'}</span></p>
            <p class="text-sm">Resposta correta: <span class="font-semibold">${q.answer}</span></p>
            <p class="text-slate-600 text-sm mt-1">${q.explanation}</p>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
