<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Simulado STP - Port States: Os 5 Estados</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">

  <div class="w-full max-w-2xl bg-white shadow-lg rounded-xl p-6">
    <div id="start-screen" class="text-center">
      <h1 class="text-2xl font-bold mb-4">Simulado STP - Port States: Os 5 Estados</h1>
      <p class="mb-6 text-slate-600">Este simulado contém 10 questões sobre STP - Spanning Three Protocol. Você terá 10 minutos para concluir.</p>
      <div class="max-w-sm mx-auto mb-4">
  <label for="user-name" class="block text-left text-sm font-medium text-slate-700 mb-1">Seu nome</label>
  <input id="user-name" type="text" placeholder="Digite seu nome" class="w-full px-3 py-2 rounded-lg border" />
</div>
<button onclick="startQuiz()" class="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Iniciar</button>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="flex justify-between items-center mb-4">
        <span id="timer" class="font-semibold text-slate-700">Tempo: 10:00</span>
        <span id="question-number" class="font-semibold text-slate-700">1</span>
      </div>

      <div class="w-full bg-slate-200 rounded-full h-3 mb-6">
        <div id="progress-bar" class="bg-blue-600 h-3 rounded-full transition-all duration-500" style="width: 0%"></div>
      </div>

      <h2 id="question-text" class="text-lg font-semibold mb-4"></h2>
      <div id="options" class="space-y-3"></div>
      <button id="next-btn" onclick="nextQuestion()" disabled class="mt-6 px-5 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">Próxima Questão</button>
    </div>

    <div id="result-screen" class="hidden text-center">
      <h2 class="text-2xl font-bold mb-4">Resultado</h2>
      <p id="score" class="mb-4 text-lg"></p>
      <div id="review" class="text-left space-y-4"></div>
      <button onclick="location.reload()" class="mt-6 px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700">Refazer Simulado</button>
    </div>
  </div>

  <script>
    const quizData = [
      { 
        question: "Qual é a principal diferença entre os estados Blocking e Disabled no STP 802.1D?", 
        options: ["Blocking encaminha tráfego; Disabled não", "Blocking recebe BPDUs ativamente; Disabled não faz absolutamente nada", "Disabled aprende MACs; Blocking não", "Ambos são idênticos funcionalmente"], 
        answer: "Blocking recebe BPDUs ativamente; Disabled não faz absolutamente nada", 
        explanation: "Uma porta em Blocking monitora a rede recebendo BPDUs — ela está ativa no plano de controle. Uma porta em Disabled foi desativada administrativamente e não participa de nenhuma função do STP, como se não existisse." 
      },

      { 
        question: "Em qual estado de porta o switch envia e recebe BPDUs, participa da eleição STP, mas NÃO aprende MACs e NÃO encaminha tráfego?", 
        options: ["Blocking", "Listening", "Learning", "Forwarding"], 
        answer: "Listening", 
        explanation: "O estado Listening é o primeiro estado de transição ativo. A porta participa da eleição STP processando e enviando BPDUs para determinar seu papel (RP, DP ou Non-Designated), mas ainda não popula a tabela CAM nem encaminha frames de dados." 
      },

      { 
        question: "Qual é o único estado em que uma porta STP encaminha tráfego de dados E aprende endereços MAC simultaneamente?", 
        options: ["Listening", "Learning", "Forwarding", "Blocking"], 
        answer: "Forwarding", 
        explanation: "O estado Forwarding é o estado operacional final. A porta realiza todas as funções: recebe e envia BPDUs, aprende MACs na tabela CAM e encaminha tráfego de dados normalmente. É o único estado onde dados de usuário trafegam." 
      },

      { 
        question: "Por que o estado Learning existe antes do Forwarding?", 
        options: ["Para aguardar a eleição do Root Bridge terminar", "Para popular a tabela CAM antes de encaminhar, evitando pico de flooding ao entrar em Forwarding", "Para verificar se há loops ativos na topologia", "Para sincronizar os timers com o Root Bridge"], 
        answer: "Para popular a tabela CAM antes de encaminhar, evitando pico de flooding ao entrar em Forwarding", 
        explanation: "Se a porta fosse direto de Listening para Forwarding, ela não conheceria nenhum MAC e faria flooding de todo tráfego recebido. O estado Learning dá 15 segundos para o switch aprender os endereços MAC do segmento, minimizando o flooding quando a porta finalmente encaminhar." 
      },

      { 
        question: "Quais estados do STP 802.1D são considerados estados de transição temporários — ou seja, só aparecem quando uma porta está subindo?", 
        options: ["Blocking e Disabled", "Listening e Learning", "Learning e Forwarding", "Blocking e Listening"], 
        answer: "Listening e Learning", 
        explanation: "Listening e Learning são estados de transição — existem apenas durante a subida de uma porta. Em operação normal estabilizada, uma porta está em Blocking (redundante) ou Forwarding (ativa). Listening e Learning desaparecem após a convergência." 
      },

      { 
        question: "Uma porta STP em estado Learning executa qual conjunto de ações?", 
        options: ["Recebe BPDUs, envia BPDUs, aprende MACs, encaminha tráfego", "Recebe BPDUs, envia BPDUs, aprende MACs, NÃO encaminha tráfego", "Recebe BPDUs, NÃO envia BPDUs, NÃO aprende MACs, NÃO encaminha tráfego", "NÃO recebe BPDUs, NÃO envia BPDUs, NÃO aprende MACs, NÃO encaminha tráfego"], 
        answer: "Recebe BPDUs, envia BPDUs, aprende MACs, NÃO encaminha tráfego", 
        explanation: "No estado Learning, a porta já está totalmente ativa no plano de controle STP (processa e envia BPDUs) e popula a tabela CAM, mas o encaminhamento de dados ainda está bloqueado. É a última etapa antes do Forwarding." 
      },

      { 
        question: "Quantos estados de porta o STP 802.1D (clássico) define?", 
        options: ["3", "4", "5", "6"], 
        answer: "5", 
        explanation: "O STP 802.1D define 5 estados: Blocking, Listening, Learning, Forwarding e Disabled. Cada estado define precisamente o que a porta pode e não pode fazer em termos de BPDUs, aprendizado MAC e encaminhamento de tráfego." 
      },

      { 
        question: "O que acontece com uma porta que estava em estado Forwarding e sofre uma falha de link (Admin Down)?", 
        options: ["Ela transiciona para Blocking automaticamente", "Ela transiciona para Disabled", "Ela retorna para Listening", "Ela permanece em Forwarding até o Max Age expirar"], 
        answer: "Ela transiciona para Disabled", 
        explanation: "Quando uma porta sofre falha ou é desativada administrativamente (shutdown), ela vai para o estado Disabled independente do estado em que estava. Do Disabled, ela retorna para Blocking quando o link voltar ou for reativado." 
      },

      { 
        question: "Em uma topologia STP convergida e estável, quais são os únicos dois estados em que as portas se encontram durante a operação normal?", 
        options: ["Listening e Learning", "Blocking e Forwarding", "Learning e Forwarding", "Listening e Forwarding"], 
        answer: "Blocking e Forwarding", 
        explanation: "Em operação normal estabilizada, portas redundantes estão em Blocking (monitorando BPDUs, prontas para assumir) e portas ativas estão em Forwarding (encaminhando dados). Listening e Learning só aparecem durante transições." 
      },

      { 
        question: "Qual estado de porta STP é ativado por decisão administrativa (comando shutdown), diferente dos demais que são controlados pelo protocolo?", 
        options: ["Blocking", "Listening", "Learning", "Disabled"], 
        answer: "Disabled", 
        explanation: "O estado Disabled é o único controlado exclusivamente pelo administrador via comando shutdown. Todos os outros estados — Blocking, Listening, Learning e Forwarding — são determinados pelo algoritmo STP em resposta à topologia da rede." 
      }

      // 👉 Adicione mais questões aqui
    ];

    // Randomiza ordem das questões
    quizData.sort(() => Math.random() - 0.5);

    let currentQuestionIndex = 0;
    let score = 0;
    let timer;
    const totalTime = 10 * 60;
    
    // Armazena as respostas do usuário para revisão
    let userAnswers = [];

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");
    const questionTextEl = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options");
    const nextBtn = document.getElementById("next-btn");
    const scoreEl = document.getElementById("score");
    const questionNumberEl = document.getElementById("question-number");
    const timerEl = document.getElementById("timer");
    const reviewEl = document.getElementById("review");

const SIMULADO_ID = "teste01";
const SIMULADO_TITULO = document.title || "Simulado";
let startTime = null;
let currentUserName = "";

// Helpers para salvar resultados no LocalStorage
function formatSeconds(s) {
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${String(m).padStart(2, "0")}:${String(r).padStart(2, "0")}`;
}
function saveResult(record) {
  try {
    const raw = localStorage.getItem("simulados");
    const arr = raw ? JSON.parse(raw) : [];
    arr.push(record);
    localStorage.setItem("simulados", JSON.stringify(arr));
  } catch (e) { console.warn("Falha ao salvar resultado:", e); }
}


    function startQuiz() {
  const nameInput = document.getElementById("user-name");
  const nameVal = (nameInput?.value || "").trim();
  if (!nameVal) { alert("Por favor, informe seu nome antes de iniciar."); return; }
  currentUserName = nameVal;
  startTime = Date.now();
      startScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
      showQuestion();
      startTimer();
    }

    function startTimer() {
      let timeLeft = totalTime;
      timer = setInterval(() => {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerEl.textContent = `Tempo: ${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
        if (timeLeft-- <= 0) {
          clearInterval(timer);
          showResults();
        }
      }, 1000);
    }

    function updateProgressBar() {
      const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
      document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function showQuestion() {
      const q = quizData[currentQuestionIndex];
      questionNumberEl.textContent = `${currentQuestionIndex+1}/${quizData.length}`;
      questionTextEl.textContent = q.question;
      optionsContainer.innerHTML = '';

      const shuffled = [...q.options].sort(() => Math.random() - 0.5);
      shuffled.forEach(opt => {
        const b = document.createElement("button");
        b.textContent = opt;
        b.classList.add("quiz-option","w-full","text-left","p-4","border-2","rounded-lg","transition-colors","duration-200","hover:bg-blue-100","hover:border-blue-400");
        b.onclick = () => selectOption(b, opt);
        optionsContainer.appendChild(b);
      });

      nextBtn.textContent = currentQuestionIndex === quizData.length - 1 ? "Ver Resultados" : "Próxima Questão";
      nextBtn.disabled = true;

      updateProgressBar();
    }

    function selectOption(button, selected) {
      const q = quizData[currentQuestionIndex];
      const buttons = document.querySelectorAll(".quiz-option");

      buttons.forEach(b => b.disabled = true);

      // Armazena a resposta do usuário para a revisão
      userAnswers[currentQuestionIndex] = selected;

      if (selected === q.answer) {
        button.classList.add("bg-green-200","border-green-600");
        score++;
      } else {
        button.classList.add("bg-red-200","border-red-600");
        buttons.forEach(b => {
          if (b.textContent === q.answer) b.classList.add("bg-green-200","border-green-600");
        });
      }

      nextBtn.disabled = false;
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < quizData.length) {
        showQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
  const endTime = Date.now();
  const timeSpentSeconds = startTime ? Math.round((endTime - startTime) / 1000) : 0;
  const resultRecord = {
    id: String(Date.now()),
    simuladoId: SIMULADO_ID,
    simuladoTitle: SIMULADO_TITULO,
    name: currentUserName,
    score: score,
    total: quizData.length,
    percent: quizData.length ? (score / quizData.length) * 100 : 0,
    timeSeconds: timeSpentSeconds,
    timeFormatted: formatSeconds(timeSpentSeconds),
    date: new Date().toISOString()
  };
  saveResult(resultRecord);
      clearInterval(timer);
      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");

      const pct = quizData.length ? Math.round((score/quizData.length)*100) : 0;
scoreEl.textContent = `Você acertou ${score} de ${quizData.length} questões (${pct}%). Tempo: ${formatSeconds(timeSpentSeconds)}.`;

      reviewEl.innerHTML = quizData.map((q, i) => {
        const isCorrect = userAnswers[i] === q.answer;
        const resultClass = isCorrect ? "bg-green-100 border-green-600" : "bg-red-100 border-red-600";
        return `
          <div class="p-4 border rounded-lg ${resultClass}">
            <p class="font-semibold">Q${i+1}: ${q.question}</p>
            <p class="text-sm">Sua resposta: <span class="font-semibold">${userAnswers[i] || 'Não respondida'}</span></p>
            <p class="text-sm">Resposta correta: <span class="font-semibold">${q.answer}</span></p>
            <p class="text-slate-600 text-sm mt-1">${q.explanation}</p>
          </div>
        `;
      }).join('');
    }
  </script>
</body>
</html>
