  <script>
    const quizData = [
      { 
        question: "Qual é a principal diferença entre os estados Blocking e Disabled no STP 802.1D?", 
        options: ["Blocking encaminha tráfego; Disabled não", "Blocking recebe BPDUs ativamente; Disabled não faz absolutamente nada", "Disabled aprende MACs; Blocking não", "Ambos são idênticos funcionalmente"], 
        answer: "Blocking recebe BPDUs ativamente; Disabled não faz absolutamente nada", 
        explanation: "Uma porta em Blocking monitora a rede recebendo BPDUs — ela está ativa no plano de controle. Uma porta em Disabled foi desativada administrativamente e não participa de nenhuma função do STP, como se não existisse." 
      },

      { 
        question: "Em qual estado de porta o switch envia e recebe BPDUs, participa da eleição STP, mas NÃO aprende MACs e NÃO encaminha tráfego?", 
        options: ["Blocking", "Listening", "Learning", "Forwarding"], 
        answer: "Listening", 
        explanation: "O estado Listening é o primeiro estado de transição ativo. A porta participa da eleição STP processando e enviando BPDUs para determinar seu papel (RP, DP ou Non-Designated), mas ainda não popula a tabela CAM nem encaminha frames de dados." 
      },

      { 
        question: "Qual é o único estado em que uma porta STP encaminha tráfego de dados E aprende endereços MAC simultaneamente?", 
        options: ["Listening", "Learning", "Forwarding", "Blocking"], 
        answer: "Forwarding", 
        explanation: "O estado Forwarding é o estado operacional final. A porta realiza todas as funções: recebe e envia BPDUs, aprende MACs na tabela CAM e encaminha tráfego de dados normalmente. É o único estado onde dados de usuário trafegam." 
      },

      { 
        question: "Por que o estado Learning existe antes do Forwarding?", 
        options: ["Para aguardar a eleição do Root Bridge terminar", "Para popular a tabela CAM antes de encaminhar, evitando pico de flooding ao entrar em Forwarding", "Para verificar se há loops ativos na topologia", "Para sincronizar os timers com o Root Bridge"], 
        answer: "Para popular a tabela CAM antes de encaminhar, evitando pico de flooding ao entrar em Forwarding", 
        explanation: "Se a porta fosse direto de Listening para Forwarding, ela não conheceria nenhum MAC e faria flooding de todo tráfego recebido. O estado Learning dá 15 segundos para o switch aprender os endereços MAC do segmento, minimizando o flooding quando a porta finalmente encaminhar." 
      },

      { 
        question: "Quais estados do STP 802.1D são considerados estados de transição temporários — ou seja, só aparecem quando uma porta está subindo?", 
        options: ["Blocking e Disabled", "Listening e Learning", "Learning e Forwarding", "Blocking e Listening"], 
        answer: "Listening e Learning", 
        explanation: "Listening e Learning são estados de transição — existem apenas durante a subida de uma porta. Em operação normal estabilizada, uma porta está em Blocking (redundante) ou Forwarding (ativa). Listening e Learning desaparecem após a convergência." 
      },

      { 
        question: "Uma porta STP em estado Learning executa qual conjunto de ações?", 
        options: ["Recebe BPDUs, envia BPDUs, aprende MACs, encaminha tráfego", "Recebe BPDUs, envia BPDUs, aprende MACs, NÃO encaminha tráfego", "Recebe BPDUs, NÃO envia BPDUs, NÃO aprende MACs, NÃO encaminha tráfego", "NÃO recebe BPDUs, NÃO envia BPDUs, NÃO aprende MACs, NÃO encaminha tráfego"], 
        answer: "Recebe BPDUs, envia BPDUs, aprende MACs, NÃO encaminha tráfego", 
        explanation: "No estado Learning, a porta já está totalmente ativa no plano de controle STP (processa e envia BPDUs) e popula a tabela CAM, mas o encaminhamento de dados ainda está bloqueado. É a última etapa antes do Forwarding." 
      },

      { 
        question: "Quantos estados de porta o STP 802.1D (clássico) define?", 
        options: ["3", "4", "5", "6"], 
        answer: "5", 
        explanation: "O STP 802.1D define 5 estados: Blocking, Listening, Learning, Forwarding e Disabled. Cada estado define precisamente o que a porta pode e não pode fazer em termos de BPDUs, aprendizado MAC e encaminhamento de tráfego." 
      },

      { 
        question: "O que acontece com uma porta que estava em estado Forwarding e sofre uma falha de link (Admin Down)?", 
        options: ["Ela transiciona para Blocking automaticamente", "Ela transiciona para Disabled", "Ela retorna para Listening", "Ela permanece em Forwarding até o Max Age expirar"], 
        answer: "Ela transiciona para Disabled", 
        explanation: "Quando uma porta sofre falha ou é desativada administrativamente (shutdown), ela vai para o estado Disabled independente do estado em que estava. Do Disabled, ela retorna para Blocking quando o link voltar ou for reativado." 
      },

      { 
        question: "Em uma topologia STP convergida e estável, quais são os únicos dois estados em que as portas se encontram durante a operação normal?", 
        options: ["Listening e Learning", "Blocking e Forwarding", "Learning e Forwarding", "Listening e Forwarding"], 
        answer: "Blocking e Forwarding", 
        explanation: "Em operação normal estabilizada, portas redundantes estão em Blocking (monitorando BPDUs, prontas para assumir) e portas ativas estão em Forwarding (encaminhando dados). Listening e Learning só aparecem durante transições." 
      },

      { 
        question: "Qual estado de porta STP é ativado por decisão administrativa (comando shutdown), diferente dos demais que são controlados pelo protocolo?", 
        options: ["Blocking", "Listening", "Learning", "Disabled"], 
        answer: "Disabled", 
        explanation: "O estado Disabled é o único controlado exclusivamente pelo administrador via comando shutdown. Todos os outros estados — Blocking, Listening, Learning e Forwarding — são determinados pelo algoritmo STP em resposta à topologia da rede." 
      },

      { 
        question: "Qual timer do STP controla o tempo que uma porta permanece nos estados Listening e Learning?", 
        options: ["Hello Time", "Max Age", "Forward Delay", "Hold Time"], 
        answer: "Forward Delay", 
        explanation: "O Forward Delay (padrão 15s) é aplicado duas vezes: a porta fica 15s em Listening e depois mais 15s em Learning. Ele existe para que o STP tenha tempo de estabilizar a topologia antes de qualquer tráfego fluir." 
      },

      { 
        question: "Uma porta em estado Blocking permanece nesse estado indefinidamente durante a operação normal. Qual é a função do Max Age nesse contexto?", 
        options: ["Define o intervalo de envio de BPDUs", "É o tempo que a porta aguarda sem receber BPDUs antes de considerar que o caminho falhou e iniciar transição", "Define o tempo em Listening antes de ir para Learning", "Controla a expiração de entradas na tabela CAM"], 
        answer: "É o tempo que a porta aguarda sem receber BPDUs antes de considerar que o caminho falhou e iniciar transição", 
        explanation: "Em operação normal, uma porta em Blocking permanece bloqueada enquanto continua recebendo BPDUs. O Max Age (20s) só entra em ação quando os BPDUs param de chegar — indicando falha. Após 20s sem BPDUs, a porta inicia a transição para Listening." 
      },

      { 
        question: "Qual é a fórmula do pior cenário de convergência do STP 802.1D (falha indireta)?", 
        options: ["Hello Time + Forward Delay = 17 segundos", "Max Age + Forward Delay = 35 segundos", "Max Age + Listening + Learning = 50 segundos", "Hello Time + Max Age + Forward Delay = 37 segundos"], 
        answer: "Max Age + Listening + Learning = 50 segundos", 
        explanation: "No pior cenário (falha indireta): Max Age (20s) + Listening (15s) + Learning (15s) = 50 segundos. Esse é o tempo máximo até a porta entrar em Forwarding. Em falha direta, o Max Age é suprimido e o tempo cai para 30s." 
      },

      { 
        question: "Qual é o tempo mínimo de convergência no STP 802.1D, quando uma Designated Port sobe diretamente sem precisar aguardar o Max Age?", 
        options: ["15 segundos", "20 segundos", "30 segundos", "50 segundos"], 
        answer: "30 segundos", 
        explanation: "No cenário de falha direta, a porta detecta imediatamente que o link caiu e não precisa aguardar os 20s do Max Age. A convergência é: Listening (15s) + Learning (15s) = 30 segundos mínimos." 
      },

      { 
        question: "Por que sessões VoIP e autenticação 802.1X são especialmente afetadas pela convergência lenta do STP 802.1D?", 
        options: ["Porque usam multicast e o STP bloqueia tráfego multicast", "Porque não toleram interrupções — VoIP cai e 802.1X falha autenticação durante os 50s de indisponibilidade", "Porque geram tráfego de broadcast que satura o STP", "Porque dependem de endereços IP que o STP não processa"], 
        answer: "Porque não toleram interrupções — VoIP cai e 802.1X falha autenticação durante os 50s de indisponibilidade", 
        explanation: "VoIP e videoconferência têm tolerância zero a interrupções — a chamada cai. Autenticação 802.1X também falha porque o cliente não consegue autenticar durante os 50s em que o switch está convergindo. Isso torna o STP 802.1D inaceitável em redes modernas." 
      },

      { 
        question: "Em qual cenário de convergência o tempo total é de exatamente 50 segundos?", 
        options: ["Boot-up de um switch recém-ligado com topologia simples", "Falha indireta onde o switch aguarda o Max Age expirar antes de transicionar", "Falha direta com detecção imediata de link down", "Reconfiguração manual de prioridade do Root Bridge"], 
        answer: "Falha indireta onde o switch aguarda o Max Age expirar antes de transicionar", 
        explanation: "Os 50 segundos ocorrem na falha indireta: um switch intermediário falha sem derrubar o link físico. O switch afetado aguarda o Max Age (20s) sem BPDUs, depois passa por Listening (15s) e Learning (15s) = 50s total." 
      },

      { 
        question: "Qual é o valor padrão do Hello Time e o que ele controla no STP?", 
        options: ["5 segundos — intervalo de reconvergência após falha", "2 segundos — intervalo de envio de BPDUs pelo Root Bridge", "15 segundos — tempo nos estados intermediários", "20 segundos — tempo máximo sem BPDUs"], 
        answer: "2 segundos — intervalo de envio de BPDUs pelo Root Bridge", 
        explanation: "O Hello Time de 2 segundos é o 'batimento cardíaco' do STP. O Root Bridge envia BPDUs a cada 2s para toda a rede. Switches não-root repassam esses BPDUs. Se um switch para de receber BPDUs, começa a contagem do Max Age." 
      },

      { 
        question: "Qual protocolo foi desenvolvido pelo IEEE especificamente para superar a limitação de convergência lenta do STP 802.1D?", 
        options: ["MSTP (802.1s)", "PVST+ da Cisco", "RSTP (802.1w)", "VTP"], 
        answer: "RSTP (802.1w)", 
        explanation: "O RSTP (Rapid Spanning Tree Protocol, IEEE 802.1w) foi criado para resolver a convergência lenta do 802.1D. Usando mecanismo de negociação ponto a ponto (Proposal/Agreement), o RSTP converge em menos de 1 segundo na maioria dos cenários — eliminando os 50s do STP clássico." 
      },

      { 
        question: "Durante o boot-up de um switch, qual é o estado inicial de todas as portas antes de qualquer BPDU ser processado?", 
        options: ["Listening", "Learning", "Forwarding", "Blocking"], 
        answer: "Blocking", 
        explanation: "Ao inicializar, todas as portas de um switch entram imediatamente em Blocking. O switch não conhece a topologia e adota a postura mais conservadora — nenhuma porta encaminha tráfego até que a eleição STP esteja concluída e os papéis definidos." 
      },

      { 
        question: "Durante o processo de boot-up, todo switch anuncia a si mesmo como Root Bridge. Por que isso é correto e esperado?", 
        options: ["É um bug do STP corrigido no RSTP", "É o comportamento normal — cada switch começa sem informação sobre a topologia e se auto-proclama Root até receber BPDUs melhores de vizinhos", "Ocorre apenas em switches Cisco com PVST+", "Indica que o switch está com prioridade zerada"], 
        answer: "É o comportamento normal — cada switch começa sem informação sobre a topologia e se auto-proclama Root até receber BPDUs melhores de vizinhos", 
        explanation: "Ao inicializar, cada switch coloca seu próprio BID nos campos Root ID e Sender Bridge ID do BPDU — se anunciando como Root. Ao receber BPDUs com Bridge ID menor, ele se 'rende' e passa a propagar o BID do vizinho superior. A eleição converge quando todos concordam sobre o menor BID." 
      },

      { 
        question: "Qual é a principal diferença operacional entre um Switch Layer 2 e um Switch Layer 3?", 
        options: ["Switch L2 usa fibra; Switch L3 usa cobre", "Switch L2 encaminha frames com base em MAC; Switch L3 encaminha pacotes com base em IP e possui controle de loop via TTL", "Switch L2 é mais rápido que Switch L3 em qualquer cenário", "Switch L3 não suporta VLANs"], 
        answer: "Switch L2 encaminha frames com base em MAC; Switch L3 encaminha pacotes com base em IP e possui controle de loop via TTL", 
        explanation: "O Switch L2 opera com MAC e tabela CAM, sem mecanismo de controle de loop nativo. O Switch L3 opera com IP e tabela de roteamento, e usa o campo TTL para limitar loops — decrementa a cada salto e descarta o pacote ao chegar a zero." 
      },

      { 
        question: "O que é a tabela CAM e qual seu comportamento quando o endereço MAC de destino é desconhecido?", 
        options: ["Tabela de roteamento IP — realiza descarte do pacote", "Content Addressable Memory — armazena MAC↔Porta e realiza flooding quando o destino é desconhecido", "Tabela ARP — resolve IP para MAC por broadcast", "Tabela de VLANs — segmenta o tráfego por VLAN"], 
        answer: "Content Addressable Memory — armazena MAC↔Porta e realiza flooding quando o destino é desconhecido", 
        explanation: "A tabela CAM (Content Addressable Memory) mapeia MAC Address para porta física. Quando o switch recebe um frame com MAC de destino desconhecido, realiza flooding — replica o frame por todas as portas exceto a de origem. Esse comportamento é a base dos loops L2." 
      },

      { 
        question: "Por que o comportamento de flooding do Switch L2 contribui diretamente para a formação de loops?", 
        options: ["Porque o flooding sobrecarrega a CPU e reinicia o switch", "Porque o frame replicado por flooding pode retornar ao switch original em topologias redundantes, reiniciando o ciclo infinitamente", "Porque o flooding desativa automaticamente as portas redundantes", "Porque o flooding apaga entradas da tabela CAM"], answer: "Porque o frame replicado por flooding pode retornar ao switch original em topologias redundantes, reiniciando o ciclo infinitamente", 
        explanation: "Em uma topologia com caminhos redundantes, o flooding envia o frame por múltiplos caminhos. Um desses caminhos pode levar o frame de volta ao switch de origem, que o processa novamente e realiza novo flooding — criando o loop infinito que o STP previne." 
      },

      { 
        question: "Qual mecanismo do Layer 3 impede que loops sejam tão destrutivos quanto os de Layer 2?", 
        options: ["Protocolo ARP limita a propagação", "O campo TTL é decrementado a cada roteador e o pacote é descartado ao chegar a zero", "Roteadores não realizam flooding de broadcast", "O protocolo OSPF detecta e elimina loops automaticamente"], 
        answer: "O campo TTL é decrementado a cada roteador e o pacote é descartado ao chegar a zero", 
        explanation: "O TTL (Time to Live) do cabeçalho IPv4 é decrementado em 1 a cada roteador (hop). Quando chega a zero, o roteador descarta o pacote e envia um ICMP Time Exceeded para a origem. Isso limita qualquer loop L3 a no máximo 255 saltos — ao contrário do L2 que é infinito." 
      },

      { 
        question: "Em qual camada da arquitetura 3-Tier o STP é mais crítico e por quê?", 
        options: ["Core Layer — porque opera em altíssima velocidade", "Distribution Layer — porque agrega todos os switches", "Access Layer e Distribution Layer — porque há maior uso de Layer 2 e redundância física nessas camadas", "Apenas no Core Layer — porque é o backbone da rede"], 
        answer: "Access Layer e Distribution Layer — porque há maior uso de Layer 2 e redundância física nessas camadas", 
        explanation: "A Access Layer conecta dispositivos finais com alto uso de L2 e é o principal ponto de ocorrência de loops. A Distribution Layer agrega switches de acesso e pode operar em L2/L3. O Core Layer normalmente opera em L3, onde loops são naturalmente mitigados pelo TTL." 
      },

      { 
        question: "Qual é a consequência direta de um loop Layer 2 em comparação com um loop Layer 3?", 
        options: ["Loop L2 é limitado pelo TTL; loop L3 é infinito", "Loop L2 é infinito e causa colapso da rede; loop L3 é limitado pelo TTL e controlado", "Ambos causam o mesmo impacto na rede", "Loop L3 causa Broadcast Storm; loop L2 causa apenas latência"], 
        answer: "Loop L2 é infinito e causa colapso da rede; loop L3 é limitado pelo TTL e controlado", 
        explanation: "Sem TTL, frames L2 circulam indefinidamente com crescimento exponencial de tráfego, causando Broadcast Storm e colapso total. Loops L3 são limitados — o TTL decrementa a cada salto e o pacote é descartado, tornando o impacto controlado." 
      },

      { 
        question: "Como o switch Layer 2 aprende os endereços MAC dos dispositivos conectados?", 
        options: ["Via protocolo ARP enviado pelo administrador", "Lendo o campo Source MAC de cada frame recebido e gravando na tabela CAM", "Via DHCP quando o dispositivo solicita endereço IP", "Via BPDUs enviados pelo Root Bridge"], 
        answer: "Lendo o campo Source MAC de cada frame recebido e gravando na tabela CAM", 
        explanation: "O aprendizado MAC no L2 é dinâmico e passivo: a cada frame recebido, o switch lê o Source MAC e grava na tabela CAM junto com a porta de entrada. Não há protocolo específico para isso — acontece automaticamente no plano de dados." 
      },

      { 
        question: "Qual é a principal limitação da Tabela de Roteamento (L3) em relação à Tabela CAM (L2) no contexto de flooding?", 
        options: ["A Tabela de Roteamento é muito maior e mais lenta", "A Tabela CAM realiza flooding quando o destino é desconhecido; a Tabela de Roteamento toma decisões determinísticas sem flooding", "A Tabela de Roteamento não suporta multicast", "A Tabela CAM é mais segura que a Tabela de Roteamento"], 
        answer: "A Tabela CAM realiza flooding quando o destino é desconhecido; a Tabela de Roteamento toma decisões determinísticas sem flooding", 
        explanation: "Quando o destino é desconhecido, o switch L2 realiza flooding para todas as portas — comportamento que alimenta loops. O roteador L3 usa a tabela de roteamento para decisão determinística; se não há rota, descarta o pacote. Não há flooding no L3." 
      },

      { 
        question: "Por que o Switch Layer 2 não possui mecanismo nativo de controle de loop?", 
        options: ["Porque foi projetado para redes pequenas sem redundância", "Porque o Ethernet foi projetado para ser simples e eficiente, sem campo TTL no frame — a prevenção de loop requer um protocolo externo como o STP", "Porque fabricantes removeram o TTL do Ethernet para aumentar a velocidade", "Porque loops L2 não existiam quando o Ethernet foi criado"], 
        answer: "Porque o Ethernet foi projetado para ser simples e eficiente, sem campo TTL no frame — a prevenção de loop requer um protocolo externo como o STP", explanation: "O Ethernet foi projetado para simplicidade e eficiência dentro de um domínio confiável. O cabeçalho não possui TTL nem hop count. Essa simplicidade o torna vulnerável em topologias redundantes, exigindo um protocolo externo — o STP — para gerenciar os loops." 
      },

      { 
        question: "Qual dos seguintes sintomas indica diretamente um loop de Camada 2 ativo na rede?", 
        options: ["Alta latência apenas em links de fibra", "LEDs de todos os switches piscando freneticamente, CPU a 100% e perda de acesso remoto SSH", "Tabela de roteamento com rotas duplicadas", "Switches reiniciando por falha de hardware"], 
        answer: "LEDs de todos os switches piscando freneticamente, CPU a 100% e perda de acesso remoto SSH", 
        explanation: "Esses são os sintomas clássicos de Broadcast Storm: LEDs piscando indicam tráfego intenso em todas as portas, CPU a 100% processa frames BUM infinitos e o acesso SSH é perdido porque o plano de controle não tem recursos para processar pacotes de gerência." 
      },

      { 
        question: "No fluxo de reconvergência após falha, qual é a sequência exata que uma porta em Blocking percorre até chegar em Forwarding?", 
        options: ["Blocking → Forwarding diretamente após Max Age", "Blocking → Listening → Learning → Forwarding, com Max Age antes de sair do Blocking", "Blocking → Learning → Forwarding", "Blocking → Disabled → Listening → Forwarding"], 
        answer: "Blocking → Listening → Learning → Forwarding, com Max Age antes de sair do Blocking", 
        explanation: "Após o Max Age expirar sem BPDUs, a porta sai do Blocking e inicia a transição: Listening (15s) → Learning (15s) → Forwarding. O Max Age (20s) é o gatilho que autoriza a transição — sem ele, a porta permanece em Blocking indefinidamente." 
      },

      { 
        question: "Em um cenário de reconvergência, SW2 para de receber BPDUs pela sua Root Port porque SW1 falhou. O que SW2 faz imediatamente?", 
        options: ["Coloca todas as portas em Forwarding imediatamente", "Aguarda o Max Age (20s) expiar antes de declarar o caminho morto e iniciar transição", "Envia um TCN para todos os switches da rede", "Reinicia o processo de eleição do Root Bridge imediatamente"], 
        answer: "Aguarda o Max Age (20s) expiar antes de declarar o caminho morto e iniciar transição", 
        explanation: "Esse é o comportamento de falha indireta: SW1 falhou mas o link físico de SW2 ainda está ativo. SW2 para de receber BPDUs mas não detecta link down. Ele aguarda o Max Age (20s) antes de considerar o caminho morto e iniciar a transição da porta alternativa." 
      },

      { 
        question: "Durante os 50 segundos de reconvergência do STP 802.1D, o que acontece com os dispositivos que dependiam do caminho que falhou?", 
        options: ["Eles migram automaticamente para o caminho alternativo via ARP", "Ficam isolados da rede — sem conectividade até a porta alternativa entrar em Forwarding", "Continuam comunicando via cache ARP por até 5 minutos", "São notificados via ICMP para usar rota alternativa"], 
        answer: "Ficam isolados da rede — sem conectividade até a porta alternativa entrar em Forwarding", 
        explanation: "Durante os 50s de reconvergência, o switch que perdeu seu caminho principal está efetivamente isolado. Sessões TCP caem, autenticações falham e VoIP é interrompido. Não há mecanismo no STP 802.1D para acelerar esse processo — a solução é o RSTP." 
      },

      { 
        question: "Qual é a diferença entre o fluxo de boot-up e o fluxo de reconvergência no STP 802.1D?", 
        options: ["No boot-up as portas começam em Forwarding; na reconvergência começam em Blocking", "No boot-up todas as portas começam em Blocking e passam pela eleição completa; na reconvergência uma porta em Blocking aguarda o Max Age e então transiciona", "No boot-up o Max Age não é usado; na reconvergência o Forward Delay não é usado", "São processos idênticos — ambos levam exatamente 50 segundos"], 
        answer: "No boot-up todas as portas começam em Blocking e passam pela eleição completa; na reconvergência uma porta em Blocking aguarda o Max Age e então transiciona", explanation: "No boot-up, o switch não sabe nada — todas as portas vão para Blocking e o processo de eleição é completo. Na reconvergência, o switch já conhece a topologia; apenas a porta alternativa precisa transicionar após o Max Age expirar sem BPDUs." 
      },

      { 
        question: "Qual é a motivação técnica direta que levou o IEEE a desenvolver o RSTP (802.1w)?", 
        options: ["O STP 802.1D não suportava VLANs múltiplas", "O STP 802.1D não funcionava em links de 1 Gbps", "O tempo de convergência de até 50 segundos do STP 802.1D é inaceitável para aplicações modernas como VoIP e 802.1X", "O STP 802.1D não tinha suporte a IPv6"], 
        answer: "O tempo de convergência de até 50 segundos do STP 802.1D é inaceitável para aplicações modernas como VoIP e 802.1X", 
        explanation: "Os 50 segundos de convergência causam quedas de chamadas VoIP, falhas de autenticação 802.1X e timeout de sessões SSH. O RSTP (IEEE 802.1w) usa negociação ponto a ponto (Proposal/Agreement) para convergir em menos de 1 segundo, tornando-o o padrão para redes modernas."

      {

      {

        explanation: "TCP tem controle de retransmissão — uma transferência interrompida pode reiniciar. VoIP e videoconferência são em tempo real, sem buffer suficiente para absorver 50 segundos de interrupção. A chamada simplesmente cai, sem possibilidade de retransmissão retroativa."

      { 
        question: "O que é uma 'falha indireta' no contexto do STP e por que ela resulta no pior tempo de convergência?",

      { 
        question: "Na arquitetura 3-Tier, qual camada é responsável por conectar dispositivos finais e é o principal ponto de ocorrência de loops L2?",

        answer: "Access Layer", 
        explanation: "A Access Layer conecta hosts, impressoras, telefones IP e outros dispositivos finais. É a camada com maior densidade de switches L2 e redundância física — portanto, o principal ponto de risco para loops de Camada 2 que o STP previne."

      { 
        question: "Qual camada da arquitetura 3-Tier normalmente opera em Layer 3, tornando o STP menos crítico nesse nível?",

        answer: "Core Layer", 
        explanation: "O Core Layer é o backbone da rede, operando em alta velocidade e normalmente em Layer 3. Com roteamento IP e TTL, loops são naturalmente limitados. O STP é mais crítico nas camadas de Access e Distribution, onde há maior uso de Layer 2."

      { 
        question: "Qual é a sequência correta de decisão de encaminhamento de um Switch Layer 2 ao receber um frame?",

        answer: "Aprende Source MAC → verifica Destination MAC → encaminha para porta específica ou realiza flooding", 
        explanation: "O plano de dados L2: 1) Lê o Source MAC e grava na CAM com a porta de entrada (aprendizado). 2) Verifica o Destination MAC: se conhecido na CAM, encaminha para a porta específica (unicast); se desconhecido/broadcast/multicast, realiza flooding para todas as portas exceto a de origem." 
      },

      { 
        question: "O que é MAC Flapping e qual é sua causa direta em um loop L2?", 
        options: ["Oscilação do link físico causada por defeito no cabo", "Atualização contínua do mesmo MAC address para portas diferentes na tabela CAM, causada pelo loop que traz o mesmo frame por múltiplos caminhos", "Expiração e renovação cíclica de entradas da tabela CAM", "Conflito de endereços MAC entre dois dispositivos"], answer: "Atualização contínua do mesmo MAC address para portas diferentes na tabela CAM, causada pelo loop que traz o mesmo frame por múltiplos caminhos", 
        explanation: "No loop, o mesmo frame circula por múltiplos caminhos chegando ao switch por portas diferentes em milissegundos. O switch atualiza a entrada do Source MAC para cada porta em que o frame chega — causando instabilidade contínua na tabela CAM, conhecida como MAC Flapping." 
      },

      { 
        question: "Qual é o resultado final de uma Broadcast Storm em termos de impacto nos switches da topologia afetada?", 
        options: ["Apenas o switch mais antigo é afetado; os demais continuam operando", "CPU de todos os switches a 100%, saturação total da banda e perda de acesso remoto de gerência", "Os switches entram em modo de failover automático e isolam o loop", "Apenas o tráfego broadcast é afetado; unicast continua normalmente"], 
        answer: "CPU de todos os switches a 100%, saturação total da banda e perda de acesso remoto de gerência", 
        explanation: "Uma Broadcast Storm afeta toda a topologia: CPU dos switches satura processando cópias infinitas de frames BUM (Broadcast, Unknown Unicast, Multicast), a banda é consumida integralmente e o acesso SSH/Telnet é perdido. A única solução costuma ser intervenção física via console." 
      },

      { 
        question: "Por que a redundância física é necessária em redes corporativas mesmo sabendo que pode causar loops L2?", 
        options: ["Porque aumenta a velocidade dos links de acesso", "Porque a alta disponibilidade exige que a falha de um único cabo ou switch não derrube o acesso à rede", "Porque o STP usa os links redundantes para balanceamento de carga", "Porque switches modernos exigem múltiplos uplinks para funcionar"], 
        answer: "Porque a alta disponibilidade exige que a falha de um único cabo ou switch não derrube o acesso à rede", 
        explanation: "Em ambientes corporativos, alta disponibilidade é mandatória. Links redundantes garantem que a falha de um cabo, switch ou porta não isole usuários. O STP é o mecanismo que permite ter essa redundância física sem os loops destrutivos que ela causaria sem controle." 
      },

      { 
        question: "Qual é o papel da Distribution Layer no contexto do STP em uma arquitetura 3-Tier?", 
        options: ["Apenas conectar hosts — sem função no STP", "Agregar switches de acesso operando em L2/L3, sendo ponto estratégico para controle de STP e posicionamento do Root Bridge", "Operar exclusivamente em Layer 3, sem nenhuma função STP", "Substituir o Core Layer quando ele falha"], 
        answer: "Agregar switches de acesso operando em L2/L3, sendo ponto estratégico para controle de STP e posicionamento do Root Bridge", 
        explanation: "A Distribution Layer agrega os switches de acesso e pode operar em L2/L3. É o ponto estratégico onde o Root Bridge deve ser posicionado (manualmente) para otimizar a topologia STP — evitando que um switch de acesso com menor MAC se torne Root e force tráfego por caminhos subótimos." 
      },

      { 
        question: "Como o STP resolve o conflito entre redundância física (necessária para alta disponibilidade) e loops L2 (destrutivos para a rede)?", 
        options: ["Desativa fisicamente os links redundantes até serem necessários", "Mantém os links físicos ativos mas bloqueia logicamente as portas redundantes — eliminando o loop lógico sem remover a redundância física", "Divide o tráfego igualmente entre todos os links redundantes", "Usa TTL para limitar a propagação de frames em loops"], 
        answer: "Mantém os links físicos ativos mas bloqueia logicamente as portas redundantes — eliminando o loop lógico sem remover a redundância física", 
        explanation: "Essa é a elegância do STP: os cabos redundantes continuam fisicamente conectados. O STP apenas coloca as portas redundantes em estado Blocking — sem encaminhar dados, mas monitorando BPDUs. Se o caminho principal falhar, a porta em Blocking pode assumir em até 50s (802.1D) ou menos de 1s (RSTP)." 
      },

      { 
        question: "Qual é a diferença funcional entre o encaminhamento L2 (flooding) e o encaminhamento L3 (roteamento) quando o destino é desconhecido?", 
        options: ["Ambos realizam flooding para encontrar o destino", "L2 realiza flooding para todas as portas exceto a de origem; L3 descarta o pacote e pode enviar ICMP Unreachable para a origem", "L2 descarta silenciosamente; L3 realiza flooding controlado", "Não há diferença — ambos consultam tabelas de encaminhamento"], 
        answer: "L2 realiza flooding para todas as portas exceto a de origem; L3 descarta o pacote e pode enviar ICMP Unreachable para a origem", 
        explanation: "No L2, destino desconhecido = flooding para todas as portas. No L3, se não há rota para o destino, o roteador descarta o pacote e pode enviar ICMP Destination Unreachable. O comportamento L3 é determinístico e não propaga tráfego desnecessário — eliminando o risco de loops por flooding." 
      },

      { 
        question: "Considerando todos os conceitos do documento 02, qual é a progressão lógica correta do aprendizado sobre STP?", 
        options: ["Comandos CLI → Timers → Estados → Loops", "Loop L2 → Por que Ethernet não controla loops → STP como solução → Estados e Timers → Limitações do 802.1D → RSTP", "Root Bridge → BPDUs → Loop → Timers → CLI", "Apenas prática em laboratório — teoria não é necessária"], 
        answer: "Loop L2 → Por que Ethernet não controla loops → STP como solução → Estados e Timers → Limitações do 802.1D → RSTP", 
        explanation: "Essa é a progressão estruturada do documento: entender o problema do loop L2, compreender por que o Ethernet não tem TTL, ver o STP como solução, aprender estados e timers, reconhecer os 50s como limitação crítica e entender que essa limitação é a motivação direta para o RSTP (802.1w)."

    ];

    // Randomiza ordem das questões
    quizData.sort(() => Math.random() - 0.5);

    let currentQuestionIndex = 0;
    let score = 0;
    let timer;
    const totalTime = 75 * 60;
    
    // Armazena as respostas do usuário para revisão
    let userAnswers = [];

    const startScreen = document.getElementById("start-screen");
    const quizScreen = document.getElementById("quiz-screen");
    const resultScreen = document.getElementById("result-screen");
    const questionTextEl = document.getElementById("question-text");
    const optionsContainer = document.getElementById("options");
    const nextBtn = document.getElementById("next-btn");
    const scoreEl = document.getElementById("score");
    const questionNumberEl = document.getElementById("question-number");
    const timerEl = document.getElementById("timer");
    const reviewEl = document.getElementById("review");

const SIMULADO_ID = "teste01";
const SIMULADO_TITULO = document.title || "Simulado";
let startTime = null;
let currentUserName = "";

// Helpers para salvar resultados no LocalStorage
function formatSeconds(s) {
  const m = Math.floor(s / 60);
  const r = s % 60;
  return `${String(m).padStart(2, "0")}:${String(r).padStart(2, "0")}`;
}
function saveResult(record) {
  try {
    const raw = localStorage.getItem("simulados");
    const arr = raw ? JSON.parse(raw) : [];
    arr.push(record);
    localStorage.setItem("simulados", JSON.stringify(arr));
  } catch (e) { console.warn("Falha ao salvar resultado:", e); }
}


    function startQuiz() {
  const nameInput = document.getElementById("user-name");
  const nameVal = (nameInput?.value || "").trim();
  if (!nameVal) { alert("Por favor, informe seu nome antes de iniciar."); return; }
  currentUserName = nameVal;
  startTime = Date.now();
      startScreen.classList.add("hidden");
      quizScreen.classList.remove("hidden");
      showQuestion();
      startTimer();
    }

    function startTimer() {
      let timeLeft = totalTime;
      timer = setInterval(() => {
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        timerEl.textContent = `Tempo: ${minutes}:${seconds < 10 ? "0" : ""}${seconds}`;
        if (timeLeft-- <= 0) {
          clearInterval(timer);
          showResults();
        }
      }, 1000);
    }

    function updateProgressBar() {
      const progress = ((currentQuestionIndex + 1) / quizData.length) * 100;
      document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function showQuestion() {
      const q = quizData[currentQuestionIndex];
      questionNumberEl.textContent = `${currentQuestionIndex+1}/${quizData.length}`;
      questionTextEl.textContent = q.question;
      optionsContainer.innerHTML = '';

      const shuffled = [...q.options].sort(() => Math.random() - 0.5);
      shuffled.forEach(opt => {
        const b = document.createElement("button");
        b.textContent = opt;
        b.classList.add("quiz-option","w-full","text-left","p-4","border-2","rounded-lg","transition-colors","duration-200","hover:bg-blue-100","hover:border-blue-400");
        b.onclick = () => selectOption(b, opt);
        optionsContainer.appendChild(b);
      });

      nextBtn.textContent = currentQuestionIndex === quizData.length - 1 ? "Ver Resultados" : "Próxima Questão";
      nextBtn.disabled = true;

      updateProgressBar();
    }

    function selectOption(button, selected) {
      const q = quizData[currentQuestionIndex];
      const buttons = document.querySelectorAll(".quiz-option");

      buttons.forEach(b => b.disabled = true);

      // Armazena a resposta do usuário para a revisão
      userAnswers[currentQuestionIndex] = selected;

      if (selected === q.answer) {
        button.classList.add("bg-green-200","border-green-600");
        score++;
      } else {
        button.classList.add("bg-red-200","border-red-600");
        buttons.forEach(b => {
          if (b.textContent === q.answer) b.classList.add("bg-green-200","border-green-600");
        });
      }

      nextBtn.disabled = false;
    }

    function nextQuestion() {
      currentQuestionIndex++;
      if (currentQuestionIndex < quizData.length) {
        showQuestion();
      } else {
        showResults();
      }
    }

    function showResults() {
  const endTime = Date.now();
  const timeSpentSeconds = startTime ? Math.round((endTime - startTime) / 1000) : 0;
  const resultRecord = {
    id: String(Date.now()),
    simuladoId: SIMULADO_ID,
    simuladoTitle: SIMULADO_TITULO,
    name: currentUserName,
    score: score,
    total: quizData.length,
    percent: quizData.length ? (score / quizData.length) * 100 : 0,
    timeSeconds: timeSpentSeconds,
    timeFormatted: formatSeconds(timeSpentSeconds),
    date: new Date().toISOString()
  };
  saveResult(resultRecord);
      clearInterval(timer);
      quizScreen.classList.add("hidden");
      resultScreen.classList.remove("hidden");

      const pct = quizData.length ? Math.round((score/quizData.length)*100) : 0;
scoreEl.textContent = `Você acertou ${score} de ${quizData.length} questões (${pct}%). Tempo: ${formatSeconds(timeSpentSeconds)}.`;

      reviewEl.innerHTML = quizData.map((q, i) => {
        const isCorrect = userAnswers[i] === q.answer;
        const resultClass = isCorrect ? "bg-green-100 border-green-600" : "bg-red-100 border-red-600";
        return `
          <div class="p-4 border rounded-lg ${resultClass}">
            <p class="font-semibold">Q${i+1}: ${q.question}</p>
            <p class="text-sm">Sua resposta: <span class="font-semibold">${userAnswers[i] || 'Não respondida'}</span></p>
            <p class="text-sm">Resposta correta: <span class="font-semibold">${q.answer}</span></p>
            <p class="text-slate-600 text-sm mt-1">${q.explanation}</p>
          </div>
        `;
      }).join('');
    }
  </script>
